<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | My Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 5% 5%; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); border-bottom: 1px solid #222; padding-bottom: 20px; }
        
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .dl-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; position: relative; }
        .dl-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .dl-thumb { width: 100%; height: 160px; background-size: cover; background-position: center; }
        .dl-info { padding: 15px; }
        .dl-info h3 { margin: 0; font-size: 1rem; color: white; }
        .play-offline { 
            display: inline-block; margin-top: 10px; color: var(--gold); 
            text-decoration: none; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px;
        }
        .empty-state { text-align: center; color: #555; margin-top: 100px; }
    </style>
</head>
<body>

    <a href="index.html" style="color: #666; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> BACK</a>
    <h1>Offline Library</h1>

    <div class="download-grid" id="downloadGrid">
        <!-- Downloads will appear here -->
    </div>

    <script>
        function loadDownloads() {
            const grid = document.getElementById('downloadGrid');
            const downloads = JSON.parse(localStorage.getItem('boda_downloads') || '[]');

            if (downloads.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h3>No masterpieces downloaded yet.</h3><p>Your offline library is empty.</p></div>';
                return;
            }

            // In your loop that generates the download cards:
grid.innerHTML = downloads.map(item => `
    <div class="dl-card">
        <div class="dl-thumb" style="background-image: url('${item.poster}')"></div>
        <div class="dl-info">
            <h3>${item.title}</h3>
            <!-- Point to the local MP4 file created by FFmpeg -->
            <a href="watch.html?video=${encodeURIComponent(item.localPath)}&offline=true" class="play-offline">
                <i class="fa-solid fa-circle-play"></i> WATCH DOWNLOAD
            </a>
        </div>
    </div>
`).join('');
        }

        window.onload = loadDownloads;
    </script>
</body>
</html>
