<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | Luxury Streaming</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --gray: #121212;
            --luxury-font: 'Cinzel', serif;
            --main-font: 'Poppins', sans-serif;
        }

        body {
            background: var(--black);
            color: white;
            font-family: var(--main-font);
            margin: 0;
            overflow-x: hidden;
            padding-bottom: 80px; 
            -webkit-tap-highlight-color: transparent;
        }

        @media (min-width: 769px) { body { padding-bottom: 0; } }

        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 4%; background: rgba(0, 0, 0, 0.95);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--gold); gap: 15px;
        }

        .logo-box img { height: 45px; cursor: pointer; }

        .search-area { flex-grow: 1; max-width: 400px; position: relative; }
        #smartSearch {
            width: 100%; padding: 10px 15px 10px 35px; border-radius: 30px;
            border: 1px solid var(--gold); background: var(--gray);
            color: white; font-size: 0.9rem; outline: none; box-sizing: border-box;
            transition: 0.3s;
        }
        #smartSearch:focus { border-color: white; box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }

        .search-area i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gold); }

        #searchResults {
            position: absolute; top: 110%; left: 0; width: 100%;
            background: #111; border: 1px solid var(--gold); border-radius: 12px;
            z-index: 2000; max-height: 450px; overflow-y: auto; display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }

        .search-item { display: flex; padding: 12px; border-bottom: 1px solid #222; cursor: pointer; gap: 15px; transition: 0.2s; }
        .search-item:hover { background: #1a1a1a; }
        .search-item img { width: 110px; height: 65px; object-fit: cover; border-radius: 6px; border: 1px solid #333; }
        .search-info h4 { margin: 0 0 4px 0; color: var(--gold); font-family: var(--luxury-font); font-size: 0.9rem; }

        nav { display: flex; align-items: center; }
        nav a {
            color: white; text-decoration: none; margin: 0 12px;
            font-family: var(--luxury-font); font-size: 0.85rem; transition: 0.3s; text-transform: uppercase;
        }
        nav a i { margin-right: 5px; color: var(--gold); }
        nav a:hover { color: var(--gold); }

        .app-dl {
            background: var(--gold); color: black; border: none;
            padding: 8px 18px; border-radius: 5px; font-weight: 600;
            cursor: pointer; font-family: var(--luxury-font); white-space: nowrap;
            transition: 0.3s;
        }
        .app-dl:active { transform: scale(0.95); }

        /* --- DYNAMIC HERO SLIDER --- */
        #hero-slider { 
            height: 75vh; 
            width: 100%;
            position: relative; 
            overflow: hidden;
            background: #000;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
        }

        .slide.active { opacity: 1; z-index: 5; }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--black) 15%, transparent 60%),
                        linear-gradient(to right, rgba(0,0,0,0.8) 0%, transparent 100%);
        }

        .hero-content { 
            padding: 0 5% 60px; 
            position: relative;
            z-index: 10;
            width: 100%; 
        }

        .hero-content h1 {
            font-size: clamp(1.8rem, 7vw, 3.8rem);
            font-family: var(--luxury-font);
            margin: 0;
            text-shadow: 2px 2px 20px rgba(0,0,0,1);
            line-height: 1.1;
        }

        .hero-content p {
            max-width: 600px;
            color: #ddd;
            margin: 15px 0 25px;
            font-size: clamp(0.85rem, 2vw, 1.05rem);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* --- SMART GRID SYSTEM --- */
        .section-title {
            font-family: var(--luxury-font); color: var(--gold);
            padding: 25px 5% 10px; font-size: 1.3rem; letter-spacing: 2px;
            display: flex; align-items: center; gap: 10px;
        }

        .grid-row { 
            display: flex; 
            overflow-x: auto; 
            padding: 5px 5% 25px; 
            gap: 15px; 
            scrollbar-width: none; 
            scroll-snap-type: x proximity;
            -webkit-overflow-scrolling: touch;
        }
        .grid-row::-webkit-scrollbar { display: none; }

        .card {
            min-width: 150px; 
            max-width: 150px; 
            height: 225px;
            background: #1a1a1a; 
            border-radius: 10px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; 
            border: 1px solid transparent; 
            position: relative;
            scroll-snap-align: start;
            flex: 0 0 auto;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

        .card-title {
            padding: 8px; 
            text-align: center; 
            color: var(--gold);
            background: linear-gradient(to top, rgba(0,0,0,1) 70%, transparent);
            position: absolute; 
            bottom: 0; 
            width: 100%;
            border-bottom-left-radius: 10px; 
            border-bottom-right-radius: 10px;
            box-sizing: border-box; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 45px; 
            line-height: 1.2;
            font-weight: 600;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .badge {
            position: absolute; top: 8px; right: 8px; background: var(--gold);
            color: black; font-size: 0.6rem; font-weight: 900;
            padding: 3px 8px; border-radius: 4px; z-index: 5;
            text-transform: uppercase;
        }

        /* --- MOBILE NAV & FIXES --- */
        @media (max-width: 768px) {
            header { padding: 10px 15px; flex-wrap: wrap; }
            .logo-box { order: 1; }
            .app-dl { order: 2; font-size: 0.7rem; padding: 6px 12px; }
            .search-area { order: 3; width: 100%; max-width: none; margin-top: 8px; }
            nav {
                position: fixed; bottom: 0; left: 0; width: 100%;
                background: #000; justify-content: space-around;
                padding: 12px 0; border-top: 1px solid var(--gold); z-index: 2000;
                backdrop-filter: blur(10px);
            }
            nav a { font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; gap: 4px; margin: 0; }
            nav a i { font-size: 1.3rem; }
            #hero-slider { height: 55vh; }
            .card { min-width: 130px; height: 195px; }
            .section-title { font-size: 1.1rem; padding: 20px 5% 5px; }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-box"><img src="logo.png" alt="BODA" onclick="location.href='index.html'"></div>
        <div class="search-area">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="smartSearch" placeholder="Search Masterpieces..." autocomplete="off">
            <div id="searchResults"></div>
        </div>
        <nav>
            <a href="index.html"><i class="fa-solid fa-house"></i>Home</a>
            <a href="series.html"><i class="fa-solid fa-tv"></i>Series</a>
            <a href="movies.html"><i class="fa-solid fa-film"></i>Movies</a>
        </nav>
        <button class="app-dl" onclick="location.href='about.html'"><i class="fa-solid fa-mobile-screen-button"></i> APP</button>
    </header>

    <section id="hero-slider">
        <!-- Slides injected by JS -->
    </section>

    <div id="today-section" style="display:none;">
        <h2 class="section-title"><i class="fa-solid fa-bolt" style="color:#FFD700;"></i> Airing Today</h2>
        <div class="grid-row" id="airing-today"></div>
    </div>

    <h2 class="section-title"><i class="fa-solid fa-fire-flame-curved"></i> Newly Released</h2>
    <div class="grid-row" id="newly-released"></div>

    <h2 class="section-title"><i class="fa-solid fa-circle-play"></i> Ongoing Titles</h2>
    <div class="grid-row" id="ongoing-titles"></div>

    <h2 class="section-title"><i class="fa-solid fa-clock"></i> Upcoming Titles</h2>
    <div class="grid-row" id="upcoming-titles"></div>

    <script>
        const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
        const SERIES_BIN = "69f3074faaba882197550749";
        const MOVIES_BIN = "69f307c736566621a80b4134";

        let allItems = [];
        let currentSlide = 0;

        async function loadContent() {
            try {
                const [seriesRes, moviesRes] = await Promise.all([
                    fetch(`https://api.jsonbin.io/v3/b/${SERIES_BIN}/latest`, { headers: { 'X-Master-Key': API_KEY }}),
                    fetch(`https://api.jsonbin.io/v3/b/${MOVIES_BIN}/latest`, { headers: { 'X-Master-Key': API_KEY }})
                ]);

                const sData = await seriesRes.json();
                const mData = await moviesRes.json();

                allItems = [
                    ...(Array.isArray(sData.record) ? sData.record : [sData.record]),
                    ...(Array.isArray(mData.record) ? mData.record : [mData.record])
                ].filter(item => item && item.title);

                renderRows(allItems);
                initHeroSlider(allItems);

            } catch (err) { console.error("Sync Failure:", err); }
        }

        function renderRows(items) {
            const todayRow = document.getElementById('airing-today');
            const newRow = document.getElementById('newly-released');
            const ongoingRow = document.getElementById('ongoing-titles');
            const upcomingRow = document.getElementById('upcoming-titles');
            
            const todayStr = new Date().toISOString().split('T')[0];
            let hasToday = false;

            items.forEach(item => {
                let isAiringToday = false;
                if(item.episodes) {
                    isAiringToday = item.episodes.some(ep => ep.releaseTime && ep.releaseTime.startsWith(todayStr));
                }

                // SMART FONT SCALING LOGIC
                const titleLength = item.title.length;
                let dynamicFS = '0.78rem'; 
                if (titleLength > 28) dynamicFS = '0.62rem';
                else if (titleLength > 18) dynamicFS = '0.7rem';

                const cardHtml = `
                    <div class="card" onclick="location.href='details.html?id=${item.id}'">
                        ${isAiringToday ? '<div class="badge">NEW EP</div>' : ''}
                        <img src="${item.cover}" alt="${item.title}" loading="lazy">
                        <div class="card-title" style="font-size: ${dynamicFS}">${item.title}</div>
                    </div>
                `;

                if (isAiringToday) { todayRow.innerHTML += cardHtml; hasToday = true; }
                if (item.status === "Ongoing") ongoingRow.innerHTML += cardHtml;
                if (item.status === "Upcoming") upcomingRow.innerHTML += cardHtml;

                const itemDate = item.startDate ? new Date(item.startDate) : new Date();
                const diff = Math.ceil(Math.abs(new Date() - itemDate) / (1000 * 60 * 60 * 24));
                if (diff <= 7) newRow.innerHTML += cardHtml;
            });

            if(hasToday) document.getElementById('today-section').style.display = 'block';
        }

        function initHeroSlider(items) {
            const slider = document.getElementById('hero-slider');
            // Filter all items marked as YES for Hero
            const heroItems = items.filter(i => i.isHero === "YES");
            
            // Fallback to latest 3 items if none marked YES
            const displayItems = heroItems.length > 0 ? heroItems : items.slice(0, 3);

            slider.innerHTML = displayItems.map((hero, index) => `
                <div class="slide ${index === 0 ? 'active' : ''}" style="background-image: url('${hero.backdrop || hero.cover}')">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <span style="color:var(--gold); font-family:var(--luxury-font); font-size:0.75rem; letter-spacing:4px; font-weight:700;">BODA EXCLUSIVE</span>
                        <h1>${hero.title}</h1>
                        <p>${hero.synopsis ? hero.synopsis : "Experience a new standard of luxury storytelling, exclusively on Boda."}</p>
                        <button class="app-dl" onclick="location.href='details.html?id=${hero.id}'">
                            <i class="fa-solid fa-play"></i> VIEW MASTERPIECE
                        </button>
                    </div>
                </div>
            `).join('');

            // Automatic Cycle
            if (displayItems.length > 1) {
                setInterval(() => {
                    const slides = document.querySelectorAll('.slide');
                    if(slides.length === 0) return;
                    slides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].classList.add('active');
                }, 6000);
            }
        }

        // --- SEARCH LOGIC ---
        const searchInput = document.getElementById('smartSearch');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            
            if (term === "iamtheadminof1227") { 
                sessionStorage.setItem("boda_admin_auth", "authenticated_1227");
                window.location.href = 'dashboard.html'; 
                return; 
            }
            
            if (term.length < 2) { searchResults.style.display = 'none'; return; }

            const matches = allItems.filter(i => i.title.toLowerCase().includes(term));
            if (matches.length > 0) {
                searchResults.innerHTML = matches.map(item => `
                    <div class="search-item" onclick="location.href='details.html?id=${item.id}'">
                        <img src="${item.backdrop || item.cover}" alt="backdrop">
                        <div class="search-info">
                            <h4>${item.title}</h4>
                            <div style="font-size:0.7rem; color:#888;">${item.category} • ${item.year}</div>
                        </div>
                    </div>
                `).join('');
                searchResults.style.display = 'block';
            } else { searchResults.style.display = 'none'; }
        });

        document.addEventListener('click', (e) => {
            if (!document.querySelector('.search-area').contains(e.target)) searchResults.style.display = 'none';
        });

        window.onload = loadContent;
    </script>
</body>
</html>
