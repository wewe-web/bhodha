<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | Premier Online Cinema</title>
    
    <!-- PWA Manifest for App Download -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-bright: #FFD700;
            --black: #050505;
            --gray: #121212;
            --luxury-font: 'Cinzel', serif;
            --main-font: 'Poppins', sans-serif;
            --glass: rgba(10, 10, 10, 0.95);
        }

        body {
            background: var(--black);
            color: white;
            font-family: var(--main-font);
            margin: 0;
            overflow-x: hidden;
            padding-bottom: 90px;
        }

        @media (min-width: 769px) {
            body { padding-bottom: 0; padding-top: 80px; }
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 5%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            box-sizing: border-box;
        }

        .logo-box img {
            height: 35px;
            cursor: pointer;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.4));
        }

        .search-area {
            flex-grow: 1;
            max-width: 400px;
            position: relative;
            margin: 0 20px;
        }

        #smartSearch {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 0.85rem;
            outline: none;
            transition: 0.3s;
        }

        #smartSearch:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.1);
        }

        .search-area i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: 0.8rem;
        }

        nav { display: flex; align-items: center; gap: 20px; }
        nav a {
            color: #ccc;
            text-decoration: none;
            font-family: var(--luxury-font);
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
            cursor: pointer;
        }

        nav a:hover, nav a.active { color: var(--gold); }

        /* Hero & Grid */
        #hero-slider {
            height: 80vh;
            display: flex;
            align-items: flex-end;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--black) 15%, transparent 70%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            padding: 0 5% 80px;
        }

        .play-btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 12px 30px;
            font-weight: 700;
            font-family: var(--luxury-font);
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .section-title {
            font-family: var(--luxury-font);
            color: var(--gold);
            padding: 40px 5% 15px;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .grid-row {
            display: flex;
            overflow-x: auto;
            padding: 0 5% 20px;
            gap: 15px;
            scrollbar-width: none;
        }

        .card {
            min-width: 160px;
            height: 240px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            header { 
                padding: 10px 5%;
                justify-content: center;
            }
            .logo-box { position: absolute; left: 5%; }
            .logo-box img { height: 25px; }
            .search-area { margin: 0 0 0 40px; width: 100%; }
            
            nav {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                background: #080808;
                padding: 15px 0;
                justify-content: space-around;
                border-top: 1px solid rgba(212, 175, 55, 0.2);
                gap: 0;
            }
            nav a {
                display: flex;
                flex-direction: column;
                align-items: center;
                font-size: 0.6rem;
                gap: 5px;
            }
            nav a i { font-size: 1.1rem; }
            #hero-slider { height: 60vh; }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-box">
            <img src="logo.png" alt="BODA" onclick="location.href='index.html'">
        </div>

        <div class="search-area">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="smartSearch" placeholder="Search films..." autocomplete="off">
            <div id="searchResults" style="position:absolute; width:100%; background:#111; top:110%; display:none; border:1px solid var(--gold); border-radius:8px; z-index:2000;"></div>
        </div>

        <nav>
            <a href="index.html" class="active"><i class="fa-solid fa-house"></i><span>Home</span></a>
            <a href="series.html"><i class="fa-solid fa-tv"></i><span>Series</span></a>
            <a href="movies.html"><i class="fa-solid fa-film"></i><span>Movies</span></a>
            <a onclick="adminAccess()"><i class="fa-solid fa-user-shield"></i><span>Admin</span></a>
        </nav>
    </header>

    <section id="hero-slider">
        <div class="hero-overlay"></div>
        <div class="hero-content" id="hero-content"></div>
    </section>

    <div id="main-content">
        <h2 class="section-title"><i class="fa-solid fa-star"></i> New Arrivals</h2>
        <div class="grid-row" id="newly-released"></div>

        <h2 class="section-title"><i class="fa-solid fa-fire"></i> Trending</h2>
        <div class="grid-row" id="ongoing-titles"></div>

        <h2 class="section-title"><i class="fa-solid fa-calendar"></i> Coming Soon</h2>
        <div class="grid-row" id="upcoming-titles"></div>
    </div>

    <script>
        // PWA Registration for "Download" Capability
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
        const SERIES_BIN = "69f3074faaba882197550749";
        const MOVIES_BIN = "69f307c736566621a80b4134";

        let allItems = [];

        // Admin Security
        function adminAccess() {
            const pass = prompt("Enter Admin Passkey:");
            if (pass === "iamtheadminof1227") {
                window.location.href = 'dashboard.html';
            } else {
                alert("Access Denied.");
            }
        }

        async function loadContent() {
            try {
                const [sRes, mRes] = await Promise.all([
                    fetch(`https://api.jsonbin.io/v3/b/${SERIES_BIN}/latest`, { headers: { 'X-Master-Key': API_KEY }}),
                    fetch(`https://api.jsonbin.io/v3/b/${MOVIES_BIN}/latest`, { headers: { 'X-Master-Key': API_KEY }})
                ]);
                const sData = await sRes.json();
                const mData = await mRes.json();

                allItems = [...(sData.record || []), ...(mData.record || [])].filter(i => i && i.title);
                
                renderData(allItems);
                setHero(allItems);
            } catch (e) { console.error(e); }
        }

        function renderData(items) {
            const rows = {
                'newly-released': document.getElementById('newly-released'),
                'ongoing-titles': document.getElementById('ongoing-titles'),
                'upcoming-titles': document.getElementById('upcoming-titles')
            };

            items.forEach(item => {
                const card = `
                    <div class="card" onclick="location.href='details.html?title=${encodeURIComponent(item.title)}'">
                        <img src="${item.cover}" alt="${item.title}" loading="lazy">
                    </div>`;
                
                if (item.status === "Ongoing") rows['ongoing-titles'].innerHTML += card;
                else if (item.status === "Upcoming") rows['upcoming-titles'].innerHTML += card;

                const isNew = (new Date() - new Date(item.timestamp)) / (1000*60*60*24) <= 7;
                if (isNew) rows['newly-released'].innerHTML += card;
            });
        }

        function setHero(items) {
            const hero = items.find(i => i.isHero === "YES") || items[0];
            if (!hero) return;
            const container = document.getElementById('hero-slider');
            container.style.backgroundImage = `url('${hero.backdrop || hero.cover}')`;
            document.getElementById('hero-content').innerHTML = `
                <h1 style="font-family:var(--luxury-font); font-size:3rem; margin:0;">${hero.title}</h1>
                <button class="play-btn" onclick="location.href='details.html?title=${encodeURIComponent(hero.title)}'">
                    <i class="fa-solid fa-play"></i> WATCH NOW
                </button>
            `;
        }

        // Search Listener
        document.getElementById('smartSearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const resBox = document.getElementById('searchResults');
            if (val.length < 2) { resBox.style.display = 'none'; return; }
            
            const filtered = allItems.filter(i => i.title.toLowerCase().includes(val));
            resBox.innerHTML = filtered.map(i => `
                <div style="padding:10px; border-bottom:1px solid #222; cursor:pointer;" onclick="location.href='details.html?title=${encodeURIComponent(i.title)}'">
                    ${i.title}
                </div>
            `).join('');
            resBox.style.display = filtered.length ? 'block' : 'none';
        });

        window.onload = loadContent;
    </script>
</body>
</html>
