<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | Luxury Streaming</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --gray: #121212;
            --luxury-font: 'Cinzel', serif;
            --main-font: 'Poppins', sans-serif;
        }

        body {
            background: var(--black);
            color: white;
            font-family: var(--main-font);
            margin: 0;
            overflow-x: hidden;
            /* Extra padding for mobile bottom nav */
            padding-bottom: 80px; 
        }

        /* Desktop users don't need the bottom padding */
        @media (min-width: 769px) {
            body { padding-bottom: 0; }
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 4%;
            background: rgba(0, 0, 0, 0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--gold);
            gap: 15px;
        }

        .logo-box img {
            height: 45px;
            cursor: pointer;
        }

        .search-area {
            flex-grow: 1;
            max-width: 400px;
            position: relative;
        }

        #smartSearch {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border-radius: 30px;
            border: 1px solid var(--gold);
            background: var(--gray);
            color: white;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
        }

        .search-area i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-family: var(--luxury-font);
            font-size: 0.85rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        nav a i { margin-right: 5px; color: var(--gold); }
        nav a:hover { color: var(--gold); }

        .app-dl {
            background: var(--gold);
            color: black;
            border: none;
            padding: 8px 18px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--luxury-font);
            white-space: nowrap;
        }

        /* Hero */
        #hero-slider {
            height: 70vh;
            display: flex;
            align-items: flex-end;
            position: relative;
        }

        .hero-content {
            padding: 0 5% 40px;
            background: linear-gradient(transparent, var(--black));
            width: 100%;
        }

        /* Layout Grids */
        .section-title {
            font-family: var(--luxury-font);
            color: var(--gold);
            padding: 25px 5% 10px;
            font-size: 1.4rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-row {
            display: flex;
            overflow-x: auto;
            padding: 0 5% 20px;
            gap: 15px;
            scroll-behavior: smooth;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .grid-row::-webkit-scrollbar { display: none; }

        .card {
            min-width: 160px;
            max-width: 160px;
            height: 240px;
            background: #1a1a1a;
            border-radius: 10px;
            transition: transform 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
            flex-shrink: 0;
            position: relative;
        }

        .card:hover { border-color: var(--gold); transform: scale(1.05); }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

        .card-title {
            padding: 8px;
            font-size: 0.75rem;
            text-align: center;
            color: var(--gold);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: rgba(0,0,0,0.7);
            position: absolute;
            bottom: 0;
            width: 100%;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        /* RESPONSIVE MOBILE FIXES */
        @media (max-width: 768px) {
            header {
                padding: 10px 15px;
                flex-wrap: wrap;
            }
            
            .logo-box { order: 1; }
            .app-dl { order: 2; font-size: 0.7rem; padding: 6px 12px; }
            .search-area { order: 3; width: 100%; max-width: none; margin-top: 8px; }

            /* Bottom Navigation for Mobile */
            nav {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                background: #000;
                justify-content: space-around;
                padding: 12px 0;
                border-top: 1px solid var(--gold);
                z-index: 2000;
            }

            nav a { 
                font-size: 0.65rem; 
                margin: 0; 
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
            }
            
            nav a i { font-size: 1.3rem; margin: 0; }

            #hero-slider { height: 45vh; }
            .hero-content h1 { font-size: 1.8rem !important; }
            .hero-content p { display: none; }
            
            .section-title { font-size: 1.1rem; }
            .card { min-width: 130px; height: 195px; }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-box">
            <img src="logo.png" alt="BODA" onclick="location.href='index.html'">
        </div>

        <div class="search-area">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="smartSearch" placeholder="Search Masterpieces...">
        </div>

        <nav>
            <a href="index.html"><i class="fa-solid fa-house"></i>Home</a>
            <a href="series.html"><i class="fa-solid fa-tv"></i>Series</a>
            <a href="movies.html"><i class="fa-solid fa-film"></i>Movies</a>
            <a href="download.html"><i class="fa-solid fa-download"></i>Downloads</a>
        </nav>

        <button class="app-dl" onclick="location.href='about.html'">
            <i class="fa-solid fa-mobile-screen-button"></i> APP
        </button>
    </header>

    <section id="hero-slider" style="background: url('boda.jpg') center/cover;">
        <div class="hero-content" id="hero-content">
            <!-- Loaded by JS -->
        </div>
    </section>

    <h2 class="section-title"><i class="fa-solid fa-fire-flame-curved"></i> Newly Released</h2>
    <div class="grid-row" id="newly-released"></div>

    <h2 class="section-title"><i class="fa-solid fa-circle-play"></i> Ongoing Titles</h2>
    <div class="grid-row" id="ongoing-titles"></div>

    <h2 class="section-title"><i class="fa-solid fa-clock"></i> Upcoming Titles</h2>
    <div class="grid-row" id="upcoming-titles"></div>

    <script>
        const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
        const SERIES_BIN = "69f3074faaba882197550749";
        const MOVIES_BIN = "69f307c736566621a80b4134";

        document.getElementById('smartSearch').addEventListener('input', (e) => {
            if (e.target.value === "iamtheadminof1227") {
                window.location.href = 'dashboard.html';
            }
        });

        async function loadContent() {
            try {
                const [seriesRes, moviesRes] = await Promise.all([
                    fetch(`https://api.jsonbin.io/v3/b/${SERIES_BIN}/latest`, { headers: { 'X-Master-Key': API_KEY }}),
                    fetch(`https://api.jsonbin.io/v3/b/${MOVIES_BIN}/latest`, { headers: { 'X-Master-Key': API_KEY }})
                ]);

                const sData = await seriesRes.json();
                const mData = await moviesRes.json();

                const allItems = [
                    ...(Array.isArray(sData.record) ? sData.record : [sData.record]),
                    ...(Array.isArray(mData.record) ? mData.record : [mData.record])
                ].filter(item => item && item.title);

                renderRows(allItems);
                updateHero(allItems);

            } catch (err) {
                console.error("Sync Failure:", err);
            }
        }

        function renderRows(items) {
            const newRow = document.getElementById('newly-released');
            const ongoingRow = document.getElementById('ongoing-titles');
            const upcomingRow = document.getElementById('upcoming-titles');

            items.forEach(item => {
                const cardHtml = `
                    <div class="card" onclick="location.href='details.html?title=${encodeURIComponent(item.title)}'">
                        <img src="${item.cover}" alt="${item.title}">
                        <div class="card-title">${item.title}</div>
                    </div>
                `;

                if (item.status === "Ongoing") ongoingRow.innerHTML += cardHtml;
                if (item.status === "Upcoming") upcomingRow.innerHTML += cardHtml;

                const diff = Math.ceil(Math.abs(new Date() - new Date(item.timestamp)) / (1000 * 60 * 60 * 24));
                if (diff <= 3) newRow.innerHTML += cardHtml;
            });
        }

        function updateHero(items) {
            const hero = items.find(i => i.isHero === "YES") || items[0];
            if (hero) {
                document.getElementById('hero-slider').style.background = `linear-gradient(to bottom, rgba(0,0,0,0.3), var(--black)), url('${hero.backdrop}') center/cover`;
                document.getElementById('hero-content').innerHTML = `
                    <h1 style="font-size: 3.2rem; font-family: var(--luxury-font); margin:0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);">${hero.title}</h1>
                    <p style="max-width: 550px; color: #ddd; font-size: 1rem; margin-bottom: 20px;">${hero.synopsis.substring(0, 140)}...</p>
                    <button class="app-dl" onclick="location.href='details.html?title=${encodeURIComponent(hero.title)}'">
                        <i class="fa-solid fa-play"></i> START WATCHING
                    </button>
                `;
            }
        }

        window.onload = loadContent;

        if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('Boda Service Worker Registered'))
      .catch(err => console.log('Service Worker Registration Failed', err));
  });
}
    </script>
</body>

</html>
