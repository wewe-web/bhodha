<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | Professional Theater</title>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #050505;
            --surface: #121212;
            --plyr-color-main: var(--gold);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--black); font-family: 'Poppins', sans-serif; 
            color: white; overflow-x: hidden;
        }

        /* Top Header */
        .theater-header {
            display: flex; align-items: center; padding: 15px 20px;
            background: linear-gradient(to bottom, #1a1a1a, transparent);
            gap: 15px; z-index: 10;
        }
        .theater-header h2 { font-family: 'Cinzel'; font-size: 0.9rem; color: var(--gold); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Video Area */
        .video-wrapper { width: 100%; background: #000; position: sticky; top: 0; z-index: 100; }

        /* Info Area */
        .info-container { padding: 15px 20px; border-bottom: 1px solid #222; }
        .main-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
        
        .actions-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
        
        .like-btn {
            background: #222; border: 1px solid #333;
            color: white; padding: 6px 16px; border-radius: 18px; cursor: pointer;
            display: flex; align-items: center; gap: 8px; font-size: 0.8rem; transition: 0.2s;
        }
        .like-btn.active { background: var(--gold); color: black; border-color: var(--gold); }

        .description { font-size: 0.85rem; color: #aaa; margin-top: 12px; display: none; } /* Hidden by default */

        /* Playlist Section (YouTube Style) */
        .playlist-header { padding: 15px 20px 5px; font-family: 'Cinzel'; color: var(--gold); font-size: 0.8rem; letter-spacing: 1px; }
        
        .playlist-item {
            display: flex; gap: 12px; padding: 10px 20px; transition: background 0.2s; text-decoration: none; color: inherit;
        }
        .playlist-item:active { background: #1a1a1a; }
        
        .thumb-box { 
            width: 140px; aspect-ratio: 16/9; background: #222; border-radius: 8px; 
            flex-shrink: 0; overflow: hidden; position: relative;
        }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-box .duration { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.8); font-size: 10px; padding: 2px 4px; border-radius: 2px; }

        .item-details { flex-grow: 1; }
        .item-details h4 { margin: 0; font-size: 0.85rem; line-height: 1.3; font-weight: 400; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-details p { margin: 4px 0 0; font-size: 0.7rem; color: #888; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: var(--black); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .gold-spinner { width: 35px; height: 35px; border: 3px solid rgba(212,175,55,0.1); border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .ui-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>

<body>

    <div id="loader">
        <div class="gold-spinner"></div>
    </div>

    <div id="mainLayout">
        <!-- Header (Only shows when not fullscreen) -->
        <nav class="theater-header" id="topNav">
            <a href="details.html" style="color:white;"><i class="fa-solid fa-chevron-left"></i></a>
            <h2 id="displaySeries">SERIES TITLE</h2>
        </nav>

        <div class="video-wrapper">
            <video id="player" playsinline controls crossorigin="anonymous"></video>
        </div>

        <div class="info-container">
            <div class="main-title" id="mainTitle">Episode --</div>
            <div class="description" id="epDesc"></div>
            
            <div class="actions-bar">
                <button class="like-btn" id="likeBtn" onclick="toggleLike()">
                    <i class="fa-regular fa-thumbs-up"></i> <span>Like</span>
                </button>
            </div>
        </div>

        <div class="playlist-header">Playlist</div>
        <div id="playlistContainer">
            <!-- Items like YouTube list -->
            <a href="#" class="playlist-item">
                <div class="thumb-box">
                    <img src="https://via.placeholder.com/140x80/222/D4AF37?text=BODA" alt="thumb">
                </div>
                <div class="item-details">
                    <h4>Episode Title...</h4>
                    <p>BODA Theater</p>
                </div>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoUrl = decodeURIComponent(params.get('video') || '');
        const seriesTitle = params.get('title') || 'BODA Theater';
        const epName = params.get('epName') || ''; // Default empty
        const epIdx = params.get('epIdx') || '1';
        const desc = params.get('desc') || ''; // Default empty

        // 1. Logic for Titles: If epName is empty, show only "Episode No."
        const finalTitle = epName.trim() !== "" ? `Episode ${epIdx} - ${epName}` : `Episode ${epIdx}`;
        document.getElementById('mainTitle').innerText = finalTitle;
        document.getElementById('displaySeries').innerText = seriesTitle;

        // 2. Logic for Description: Only show and populate if it exists
        const descEl = document.getElementById('epDesc');
        if (desc.trim() !== "" && desc !== "null") {
            descEl.innerText = desc;
            descEl.style.display = "block";
        }

        const video = document.getElementById('player');
        const loader = document.getElementById('loader');

        // Fast Loader removal fallback
        const safetyTimeout = setTimeout(() => { loader.style.display = 'none'; }, 4000);

        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen']
        });

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                loader.style.display = 'none';
                clearTimeout(safetyTimeout);
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', () => {
                loader.style.display = 'none';
                clearTimeout(safetyTimeout);
            });
        }

        function toggleLike() {
            const btn = document.getElementById('likeBtn');
            btn.classList.toggle('active');
            const icon = btn.querySelector('i');
            const txt = btn.querySelector('span');
            if(btn.classList.contains('active')) {
                icon.className = 'fa-solid fa-thumbs-up';
                txt.innerText = 'Liked';
            } else {
                icon.className = 'fa-regular fa-thumbs-up';
                txt.innerText = 'Like';
            }
        }

        // Fullscreen visibility logic
        player.on('enterfullscreen', () => {
            document.getElementById('topNav').style.display = 'none';
        });
        player.on('exitfullscreen', () => {
            document.getElementById('topNav').style.display = 'flex';
        });
    </script>
</body>
</html>
