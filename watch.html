<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BODA | Professional Theater</title>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #050505;
            --surface: #111111;
            --plyr-color-main: var(--gold);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--black); font-family: 'Poppins', sans-serif; 
            color: white; overflow: hidden;
        }

        /* Video Section - Stays Fixed at Top */
        .video-container {
            width: 100%; background: #000; position: sticky; top: 0; z-index: 100;
        }

        .theater-nav {
            display: flex; align-items: center; padding: 12px 20px;
            background: #000; gap: 15px;
        }
        .theater-nav h2 { font-family: 'Cinzel'; font-size: 0.8rem; color: var(--gold); margin: 0; letter-spacing: 1px; }

        /* Current Playing Info */
        .now-playing-box { padding: 15px 20px; background: var(--surface); border-bottom: 1px solid #222; }
        .current-ep-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
        .current-ep-desc { font-size: 0.75rem; color: #888; line-height: 1.4; display: none; }

        /* Sequential Playlist Area */
        .playlist-scroll {
            height: calc(100vh - 360px); /* Keeps playlist scrollable below video */
            overflow-y: auto;
            background: var(--black);
        }
        .list-label { padding: 15px 20px 10px; font-family: 'Cinzel'; color: var(--gold); font-size: 0.7rem; opacity: 0.8; }

        /* Episode Row Items */
        .ep-row {
            display: flex; align-items: center; gap: 12px; padding: 10px 20px;
            text-decoration: none; color: white; border-bottom: 1px solid #161616;
            transition: background 0.2s;
        }
        .ep-row:active { background: #1a1a1a; }
        
        /* Thumbnail is the Backdrop */
        .ep-backdrop {
            width: 120px; aspect-ratio: 16/9; background: #222; 
            border-radius: 4px; overflow: hidden; flex-shrink: 0; position: relative;
        }
        .ep-backdrop img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        
        .ep-meta { flex-grow: 1; overflow: hidden; }
        .ep-meta h4 { margin: 0; font-size: 0.8rem; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ep-meta p { margin: 2px 0 0; font-size: 0.65rem; color: #666; }

        /* Sequential Highlight */
        .ep-row.playing { background: rgba(212, 175, 55, 0.08); }
        .ep-row.playing h4 { color: var(--gold); font-weight: 600; }
        .playing-indicator { color: var(--gold); font-size: 0.7rem; }

        #loader { position: fixed; inset: 0; background: var(--black); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .spinner { width: 30px; height: 30px; border: 2px solid #222; border-top: 2px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="video-container">
        <nav class="theater-nav">
            <a href="javascript:history.back()" style="color:white;"><i class="fa-solid fa-chevron-left"></i></a>
            <h2 id="seriesTitle">LOADING...</h2>
        </nav>
        
        <video id="player" playsinline controls crossorigin="anonymous"></video>
        
        <div class="now-playing-box">
            <div class="current-ep-title" id="displayEp">Episode --</div>
            <div class="current-ep-desc" id="displayDesc"></div>
        </div>
    </div>

    <div class="playlist-scroll">
        <div class="list-label">Sequential Episodes</div>
        <div id="episodeList">
            <!-- Episode items will appear here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoUrl = decodeURIComponent(params.get('video') || '');
        const backdrop = decodeURIComponent(params.get('backdrop') || ''); // Backdrop as thumbnail
        const series = params.get('title') || 'BODA Theater';
        const epName = params.get('epName') || '';
        const epIdx = params.get('epIdx') || '1';
        const desc = params.get('desc') || '';

        // Update Header & Current Info
        document.getElementById('seriesTitle').innerText = series;
        document.getElementById('displayEp').innerText = epName.trim() !== "" ? `EP ${epIdx}: ${epName}` : `Episode ${epIdx}`;
        
        if (desc && desc !== "null") {
            const descDiv = document.getElementById('displayDesc');
            descDiv.innerText = desc;
            descDiv.style.display = "block";
        }

        // Initialize Video Player
        const video = document.getElementById('player');
        const player = new Plyr(video, { 
            controls: ['play', 'progress', 'current-time', 'mute', 'fullscreen'],
            autoplay: true 
        });

        // HLS Playing Logic
        function loadVideo(url) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    document.getElementById('loader').style.display = 'none';
                    video.play().catch(() => { /* Handle auto-play block */ });
                });
            } else {
                video.src = url;
                video.onloadedmetadata = () => {
                    document.getElementById('loader').style.display = 'none';
                    video.play();
                };
            }
        }

        loadVideo(videoUrl);

        // Generate the "Now Playing" row in the sequential list
        const listContainer = document.getElementById('episodeList');
        const row = document.createElement('div');
        row.className = 'ep-row playing';
        row.innerHTML = `
            <div class="ep-backdrop">
                <img src="${backdrop}" onerror="this.src='https://via.placeholder.com/120x68/111/D4AF37?text=BODA'">
            </div>
            <div class="ep-meta">
                <h4>${epName ? 'EP ' + epIdx + ': ' + epName : 'Episode ' + epIdx}</h4>
                <p>Now Playing</p>
            </div>
            <div class="playing-indicator"><i class="fa-solid fa-volume-high"></i></div>
        `;
        listContainer.appendChild(row);

        // Auto-hide loader safety
        setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 4000);
    </script>
</body>
</html>
