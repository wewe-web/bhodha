<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BODA | Theater</title>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #050505;
            --surface: #121212;
            --plyr-color-main: var(--gold);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--black); font-family: 'Poppins', sans-serif; 
            color: white; overflow: hidden; /* Prevents double scroll */
        }

        /* Fixed Video Header */
        .video-section {
            width: 100%; background: #000; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .theater-header {
            display: flex; align-items: center; padding: 12px 20px;
            background: #000; gap: 15px;
        }
        .theater-header h2 { font-family: 'Cinzel'; font-size: 0.8rem; color: var(--gold); margin: 0; letter-spacing: 1px; }

        /* Episode Info */
        .now-playing-info { padding: 15px 20px; background: linear-gradient(to bottom, #000, var(--surface)); }
        .current-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; }
        .current-desc { font-size: 0.8rem; color: #888; line-height: 1.4; display: none; }

        /* Scrollable Playlist Area */
        .playlist-area {
            height: calc(100vh - 350px); /* Adjust based on video height */
            overflow-y: auto;
            padding-bottom: 40px;
        }
        .playlist-label { 
            padding: 20px 20px 10px; font-family: 'Cinzel'; 
            color: var(--gold); font-size: 0.7rem; border-bottom: 1px solid #222;
        }

        /* Playlist Item Styling */
        .ep-row {
            display: flex; align-items: center; gap: 15px; padding: 12px 20px;
            text-decoration: none; color: white; border-bottom: 1px solid #1a1a1a;
            transition: 0.2s;
        }
        .ep-row:active { background: #1a1a1a; }
        .ep-row.active { background: rgba(212,175,55,0.05); }

        .ep-thumb {
            width: 100px; aspect-ratio: 16/9; background: #222; 
            border-radius: 4px; overflow: hidden; flex-shrink: 0;
            border: 1px solid #333;
        }
        .ep-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        .ep-details { flex-grow: 1; overflow: hidden; }
        .ep-details h4 { margin: 0; font-size: 0.85rem; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ep-details p { margin: 2px 0 0; font-size: 0.7rem; color: #666; }

        /* Now Playing Animation (Audio Style) */
        .playing-icon { color: var(--gold); font-size: 0.8rem; display: none; }
        .active .playing-icon { display: block; }
        .active .ep-details h4 { color: var(--gold); }

        #loader { position: fixed; inset: 0; background: var(--black); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .gold-spinner { width: 30px; height: 30px; border: 2px solid rgba(212,175,55,0.1); border-top: 2px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div id="loader"><div class="gold-spinner"></div></div>

    <div class="video-section">
        <nav class="theater-header">
            <a href="javascript:history.back()" style="color:white;"><i class="fa-solid fa-chevron-left"></i></a>
            <h2 id="seriesLabel">SERIES</h2>
        </nav>
        <video id="player" playsinline controls crossorigin="anonymous"></video>
        
        <div class="now-playing-info">
            <div class="current-title" id="mainTitle">Episode --</div>
            <div class="current-desc" id="mainDesc"></div>
        </div>
    </div>

    <div class="playlist-area">
        <div class="playlist-label">Episodes List</div>
        <div id="playlistContainer">
            <!-- Items will be generated or can be hardcoded here -->
            <a href="#" class="ep-row active">
                <div class="ep-thumb">
                    <img src="your-backdrop-image.jpg" alt="ep">
                </div>
                <div class="ep-details">
                    <h4>Episode 1</h4>
                    <p>Now Playing</p>
                </div>
                <div class="playing-icon">
                    <i class="fa-solid fa-volume-high"></i>
                </div>
            </a>

            <!-- Example of other episodes -->
            <div id="dynamicPlaylist"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoUrl = decodeURIComponent(params.get('video') || '');
        const series = params.get('title') || 'BODA Cinema';
        const epName = params.get('epName') || '';
        const epIdx = params.get('epIdx') || '1';
        const desc = params.get('desc') || '';

        document.getElementById('seriesLabel').innerText = series;
        document.getElementById('mainTitle').innerText = epName.trim() !== "" ? `EP ${epIdx} - ${epName}` : `Episode ${epIdx}`;
        
        if (desc.trim() !== "" && desc !== "null") {
            const d = document.getElementById('mainDesc');
            d.innerText = desc;
            d.style.display = "block";
        }

        const video = document.getElementById('player');
        const player = new Plyr(video, { 
            controls: ['play', 'progress', 'current-time', 'mute', 'fullscreen'] 
        });

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => document.getElementById('loader').style.display = 'none');
        } else {
            video.src = videoUrl;
            video.onloadedmetadata = () => document.getElementById('loader').style.display = 'none';
        }

        // Safety loader clear
        setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 3000);
    </script>
</body>
</html>
