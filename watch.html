<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | Professional Theater</title>

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@silvermine/videojs-quality-selector/dist/css/quality-selector.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); overflow: hidden; font-family: 'Poppins', sans-serif; min-height: -webkit-fill-available; }
        .video-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; }
        .video-js { width: 100% !important; height: 100% !important; }
        .vjs-matrix.video-js { color: var(--gold); }

        .video-js .vjs-big-play-button {
            background-color: rgba(212, 175, 55, 0.2) !important;
            border: 2px solid var(--gold) !important;
            border-radius: 50%; width: 80px; height: 80px;
            line-height: 76px; top: 50%; left: 50%;
            margin-top: -40px; margin-left: -40px;
            backdrop-filter: blur(10px);
        }

        .vjs-play-progress, .vjs-volume-level { background-color: var(--gold) !important; }

        .player-nav, .lock-wrapper { position: absolute; z-index: 100; opacity: 0; visibility: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .player-nav { top: env(safe-area-inset-top, 20px); left: 20px; }
        .lock-wrapper { top: 50%; right: 20px; transform: translateY(-50%); }
        .container-active .player-nav, .container-active .lock-wrapper { opacity: 1; visibility: visible; }

        body.is-locked .player-nav, body.is-locked .vjs-control-bar, body.is-locked .vjs-big-play-button { 
            pointer-events: none !important; opacity: 0 !important; visibility: hidden !important;
        }

        .btn-ui { background: rgba(0, 0, 0, 0.5); color: white; border: 1px solid rgba(212, 175, 55, 0.5); border-radius: 50px; backdrop-filter: blur(15px); cursor: pointer; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .btn-back { text-decoration: none; padding: 10px 20px; font-size: 0.8rem; font-family: 'Cinzel', serif; display: flex; align-items: center; gap: 8px; }
        .btn-lock { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }

        body.is-locked .lock-wrapper { opacity: 0.2; visibility: visible; pointer-events: auto; }
        body.is-locked .btn-lock { border-color: #ff4444; color: #ff4444; background: rgba(0,0,0,0.8); }

        #loader { position: fixed; inset: 0; background: var(--black); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .gold-spinner { width: 30px; height: 30px; border: 2px solid rgba(212, 175, 55, 0.1); border-top: 2px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="container-active">

    <div id="loader">
        <div class="gold-spinner"></div>
        <p style="color: var(--gold); margin-top: 15px; font-family: 'Cinzel'; letter-spacing: 2px; font-size: 0.7rem;">ESTABLISHING SECURE LINK</p>
    </div>

    <nav class="player-nav">
        <a href="javascript:history.back()" class="btn-ui btn-back">
            <i class="fa-solid fa-arrow-left"></i> EXIT
        </a>
    </nav>

    <div class="lock-wrapper">
        <button class="btn-ui btn-lock" id="lockBtn">
            <i class="fa-solid fa-lock-open"></i>
        </button>
    </div>

    <div class="video-container" id="playerWrapper">
        <video id="boda-player" class="video-js vjs-big-play-centered vjs-matrix" crossorigin="anonymous" playsinline controls preload="auto"></video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://unpkg.com/@silvermine/videojs-quality-selector/dist/js/silvermine-videojs-quality-selector.min.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        let rawVideoUrl = params.get('video');
        const vttUrl = params.get('vtt');
        const isOfflineMode = params.get('offline') === 'true';

        const player = videojs('boda-player', {
            autoplay: true,
            responsive: true,
            fluid: true,
            userActions: { hotkeys: true },
            controlBar: {
                children: [
                    'playToggle', 'volumePanel', 'currentTimeDisplay', 
                    'timeDivider', 'durationDisplay', 'progressControl', 
                    'playbackRateMenuButton', 'subsCapsButton', 'fullscreenToggle',
                ],
            },
        });

        player.controlBar.addChild('QualitySelector');

        async function initPlayer() {
            if (!rawVideoUrl) return;
            const decodedUrl = decodeURIComponent(decodeURIComponent(rawVideoUrl));

            if (isOfflineMode) {
                // Fetch from Cache Storage for Offline Playback
                const cache = await caches.open('boda-videos');
                const cachedResponse = await cache.match(decodedUrl);

                if (cachedResponse) {
                    const blob = await cachedResponse.blob();
                    const localUrl = URL.createObjectURL(blob);
                    player.src({ src: localUrl, type: 'video/mp4' });
                } else {
                    alert("Media not found in local storage.");
                }
            } else {
                player.src({ src: decodedUrl, type: 'video/mp4' });
            }

            if (vttUrl && vttUrl !== "null") {
                player.addRemoteTextTrack({
                    kind: 'captions', srclang: 'en', label: 'English',
                    src: decodeURIComponent(vttUrl), default: true
                }, false);
            }
        }

        initPlayer();

        // UI & Interaction Logic
        player.on('ready', () => {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 800);
        });

        player.on('fullscreenchange', () => {
            if (player.isFullscreen() && screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        });

        const lockBtn = document.getElementById('lockBtn');
        let isLocked = false;
        let lockTimer;

        lockBtn.addEventListener('click', () => {
            if (!isLocked) {
                isLocked = true;
                document.body.classList.add('is-locked');
                lockBtn.innerHTML = '<i class="fa-solid fa-lock"></i>';
                if (navigator.vibrate) navigator.vibrate(40);
            }
        });

        const startUnlock = () => {
            if (!isLocked) return;
            lockTimer = setTimeout(() => {
                isLocked = false;
                document.body.classList.remove('is-locked');
                lockBtn.innerHTML = '<i class="fa-solid fa-lock-open"></i>';
                if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                handleUserActivity();
            }, 2000); 
        };

        const stopUnlock = () => clearTimeout(lockTimer);
        lockBtn.addEventListener('mousedown', startUnlock);
        lockBtn.addEventListener('touchstart', startUnlock);
        window.addEventListener('mouseup', stopUnlock);
        window.addEventListener('touchend', stopUnlock);

        let uiTimer;
        function handleUserActivity() {
            if (isLocked) return;
            document.body.classList.add('container-active');
            clearTimeout(uiTimer);
            uiTimer = setTimeout(() => {
                if (!player.paused()) document.body.classList.remove('container-active');
            }, 3500);
        }

        ['mousemove', 'touchstart', 'click'].forEach(evt => window.addEventListener(evt, handleUserActivity));
    </script>
</body>
</html>
