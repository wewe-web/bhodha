<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | Professional Theater</title>

    <!-- Plyr API Style -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #050505;
            /* Customizing Plyr to Gold */
            --plyr-color-main: var(--gold);
            --plyr-video-background: #000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--black); font-family: 'Poppins', sans-serif; 
            min-height: -webkit-fill-available; overflow: hidden;
        }

        /* Fixed Navigation - This ensures it stays visible after exiting fullscreen */
        .global-ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.4s ease;
        }

        .player-nav {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            pointer-events: auto;
        }

        .lock-wrapper {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            pointer-events: auto;
        }

        .btn-ui { 
            background: rgba(0, 0, 0, 0.6); 
            color: white; 
            border: 1px solid rgba(212, 175, 55, 0.5); 
            border-radius: 50px; 
            backdrop-filter: blur(15px); 
            cursor: pointer; 
            transition: 0.3s; 
            -webkit-tap-highlight-color: transparent; 
        }

        .btn-back { 
            text-decoration: none; 
            padding: 10px 20px; 
            font-size: 0.8rem; 
            font-family: 'Cinzel', serif; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            color: white;
        }

        .btn-lock { 
            width: 45px; height: 45px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
        }

        /* Active/Idle Logic */
        .ui-hidden { opacity: 0; visibility: hidden; }
        
        body.is-locked .player-nav, 
        body.is-locked .plyr__controls { 
            display: none !important; 
        }

        body.is-locked .btn-lock { 
            border-color: #ff4444; color: #ff4444; background: rgba(0,0,0,0.8);
            opacity: 0.3;
        }

        /* Loader */
        #loader { 
            position: fixed; inset: 0; background: var(--black); 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 2000; 
        }

        .gold-spinner { 
            width: 30px; height: 30px; 
            border: 2px solid rgba(212, 175, 55, 0.1); 
            border-top: 2px solid var(--gold); 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Plyr Overrides */
        .plyr--full-ui input[type=range] { color: var(--gold); }
        .plyr__control--overlaid { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--gold); }
    </style>
</head>

<body>

    <div id="loader">
        <div class="gold-spinner"></div>
        <p style="color: var(--gold); margin-top: 15px; font-family: 'Cinzel'; letter-spacing: 2px; font-size: 0.6rem;">INITIALIZING CINEMA</p>
    </div>

    <!-- UI Layer -->
    <div class="global-ui" id="uiLayer">
        <nav class="player-nav">
            <a href="javascript:history.back()" class="btn-ui btn-back">
                <i class="fa-solid fa-arrow-left"></i> EXIT
            </a>
        </nav>

        <div class="lock-wrapper">
            <button class="btn-ui btn-lock" id="lockBtn">
                <i class="fa-solid fa-lock-open"></i>
            </button>
        </div>
    </div>

    <div class="video-container">
        <video id="player" playsinline controls crossorigin="anonymous">
            <source src="" type="video/mp4" />
        </video>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const rawVideoUrl = params.get('video');
        const vttUrl = params.get('vtt');
        const isOfflineMode = params.get('offline') === 'true';

        // Initialize Plyr
        const player = new Plyr('#player', {
            controls: [
                'play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 
                'captions', 'settings', 'pip', 'airplay', 'fullscreen'
            ],
            settings: ['quality', 'speed'],
            keyboard: { focused: true, global: true },
            tooltips: { controls: true, seek: true }
        });

        async function setupSource() {
            if (!rawVideoUrl) return;
            const decodedUrl = decodeURIComponent(decodeURIComponent(rawVideoUrl));
            const videoElement = document.getElementById('player');

            if (isOfflineMode) {
                const cache = await caches.open('boda-videos');
                const cachedResponse = await cache.match(decodedUrl);
                if (cachedResponse) {
                    const blob = await cachedResponse.blob();
                    videoElement.src = URL.createObjectURL(blob);
                } else {
                    alert("Media not found in local storage.");
                }
            } else {
                videoElement.src = decodedUrl;
            }

            if (vttUrl && vttUrl !== "null") {
                const track = document.createElement('track');
                track.kind = 'captions';
                track.label = 'English';
                track.srclang = 'en';
                track.src = decodeURIComponent(vttUrl);
                track.default = true;
                videoElement.appendChild(track);
            }
        }

        setupSource();

        // Screen Orientation & Fullscreen Logic
        player.on('enterfullscreen', () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        });

        player.on('exitfullscreen', () => {
            if (screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
            // Force UI update to ensure Exit button is visible
            handleUserActivity();
        });

        // Loader removal
        player.on('ready', () => {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 1000);
        });

        // Lock & UI Controls
        const lockBtn = document.getElementById('lockBtn');
        const uiLayer = document.getElementById('uiLayer');
        let isLocked = false;
        let uiTimer;

        lockBtn.addEventListener('click', () => {
            isLocked = !isLocked;
            if (isLocked) {
                document.body.classList.add('is-locked');
                lockBtn.innerHTML = '<i class="fa-solid fa-lock"></i>';
                if (navigator.vibrate) navigator.vibrate(40);
                // Hide UI immediately when locked
                uiLayer.classList.add('ui-hidden');
            } else {
                document.body.classList.remove('is-locked');
                lockBtn.innerHTML = '<i class="fa-solid fa-lock-open"></i>';
                handleUserActivity();
            }
        });

        function handleUserActivity() {
            if (isLocked) {
                // Show only the lock button briefly when locked and screen is touched
                uiLayer.classList.remove('ui-hidden');
                clearTimeout(uiTimer);
                uiTimer = setTimeout(() => { if(isLocked) uiLayer.classList.add('ui-hidden'); }, 2000);
                return;
            }

            uiLayer.classList.remove('ui-hidden');
            clearTimeout(uiTimer);
            uiTimer = setTimeout(() => {
                if (player.playing) uiLayer.classList.add('ui-hidden');
            }, 3500);
        }

        ['mousemove', 'touchstart', 'click'].forEach(evt => window.addEventListener(evt, handleUserActivity));
    </script>
</body>
</html>
