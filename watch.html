<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | Professional Theater</title>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #050505;
            --plyr-color-main: var(--gold);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--black); font-family: 'Poppins', sans-serif; 
            color: white; overflow-x: hidden;
        }

        /* Top Header */
        .theater-header {
            display: flex; align-items: center; padding: 15px 20px;
            background: linear-gradient(to bottom, #111, transparent);
            gap: 15px; z-index: 10;
        }
        .theater-header h2 { font-family: 'Cinzel'; font-size: 1rem; color: var(--gold); margin: 0; }

        /* Video Area */
        .video-wrapper { width: 100%; background: #000; position: relative; }

        /* Content Info Area */
        .info-container { padding: 20px; }
        .ep-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .ep-number { font-family: 'Cinzel'; color: var(--gold); font-size: 1.2rem; }
        
        .like-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--gold);
            color: white; padding: 8px 20px; border-radius: 20px; cursor: pointer;
            transition: 0.3s;
        }
        .like-btn.active { background: var(--gold); color: black; }

        .description { font-size: 0.85rem; color: #bbb; line-height: 1.6; margin: 15px 0; }

        /* Horizontal Scroll for Next Episodes */
        .next-label { font-family: 'Cinzel'; color: var(--gold); font-size: 0.9rem; margin: 20px 0 10px; }
        .next-episodes { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .next-episodes::-webkit-scrollbar { display: none; }
        
        .next-card {
            min-width: 140px; aspect-ratio: 16/9; background: #111; border-radius: 8px;
            overflow: hidden; border: 1px solid #333; position: relative;
        }
        .next-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .next-card span { position: absolute; bottom: 5px; left: 8px; font-size: 0.7rem; font-weight: bold; }

        /* UI Layer for Fullscreen */
        .global-ui { position: fixed; inset: 0; pointer-events: none; z-index: 1000; transition: opacity 0.4s; }
        .lock-wrapper { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); pointer-events: auto; }
        .btn-ui { background: rgba(0,0,0,0.6); color: white; border: 1px solid var(--gold); border-radius: 50px; cursor: pointer; }
        .btn-lock { width: 45px; height: 45px; border-radius: 50%; }
        .ui-hidden { opacity: 0; visibility: hidden; }

        #loader { position: fixed; inset: 0; background: var(--black); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .gold-spinner { width: 30px; height: 30px; border: 2px solid rgba(212,175,55,0.1); border-top: 2px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div id="loader">
        <div class="gold-spinner"></div>
        <p style="color: var(--gold); margin-top: 15px; font-family: 'Cinzel'; letter-spacing: 2px; font-size: 0.6rem;">INITIALIZING CINEMA</p>
    </div>

    <!-- UI Overlay (Mainly for fullscreen/lock) -->
    <div class="global-ui" id="uiLayer">
        <div class="lock-wrapper">
            <button class="btn-ui btn-lock" id="lockBtn"><i class="fa-solid fa-lock-open"></i></button>
        </div>
    </div>

    <!-- Non-Fullscreen Layout -->
    <div id="nonFullscreenContent">
        <nav class="theater-header">
            <a href="details.html" style="color:white;"><i class="fa-solid fa-arrow-left"></i></a>
            <h2 id="displayTitle">STUDIO LOADING...</h2>
        </nav>

        <div class="video-wrapper">
            <video id="player" playsinline controls crossorigin="anonymous"></video>
        </div>

        <div class="info-container">
            <div class="ep-meta">
                <div class="ep-number" id="epNum">EPISODE --</div>
                <button class="like-btn" id="likeBtn" onclick="toggleLike()">
                    <i class="fa-regular fa-thumbs-up"></i> <span id="likeCount">LIKE</span>
                </button>
            </div>
            <div class="description" id="epDesc">Fetching episode details and synopsis...</div>

            <div class="next-label">Next Episodes</div>
            <div class="next-episodes" id="nextList">
                <!-- Dynamically filled -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoUrl = decodeURIComponent(params.get('video') || '');
        const title = params.get('title') || 'BODA Cinema';
        const epName = params.get('epName') || 'Untitled';
        const epIdx = params.get('epIdx') || '1';

        document.getElementById('displayTitle').innerText = title;
        document.getElementById('epNum').innerText = `EPISODE ${epIdx}: ${epName}`;

        const video = document.getElementById('player');
        
        // Initialize Plyr
        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen']
        });

        // HLS Support Logic (Fixes the .m3u8 issue)
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                document.getElementById('loader').style.display = 'none';
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari native support
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', () => {
                document.getElementById('loader').style.display = 'none';
            });
        }

        // Like Button Logic
        function toggleLike() {
            const btn = document.getElementById('likeBtn');
            const icon = btn.querySelector('i');
            if(!btn.classList.contains('active')) {
                btn.classList.add('active');
                icon.className = 'fa-solid fa-thumbs-up';
                btn.querySelector('span').innerText = 'LIKED';
                if(navigator.vibrate) navigator.vibrate(50);
            }
        }

        // UI Logic (Lock/Hide)
        const lockBtn = document.getElementById('lockBtn');
        const uiLayer = document.getElementById('uiLayer');
        let isLocked = false;
        let uiTimer;

        lockBtn.addEventListener('click', () => {
            isLocked = !isLocked;
            lockBtn.innerHTML = isLocked ? '<i class="fa-solid fa-lock"></i>' : '<i class="fa-solid fa-lock-open"></i>';
            document.body.style.pointerEvents = isLocked ? 'none' : 'auto';
            lockBtn.style.pointerEvents = 'auto'; // Keep lock clickable
        });

        function handleActivity() {
            uiLayer.classList.remove('ui-hidden');
            clearTimeout(uiTimer);
            uiTimer = setTimeout(() => { if(player.playing) uiLayer.classList.add('ui-hidden'); }, 3000);
        }
        window.addEventListener('touchstart', handleActivity);
    </script>
</body>
</html>
