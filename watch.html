<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | Professional Theater</title>

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@silvermine/videojs-quality-selector/dist/css/quality-selector.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--black); overflow: hidden;
            font-family: 'Poppins', sans-serif;
            min-height: -webkit-fill-available;
        }

        .video-container {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .video-js { width: 100% !important; height: 100% !important; }
        .vjs-matrix.video-js { color: var(--gold); }

        .video-js .vjs-big-play-button {
            background-color: rgba(212, 175, 55, 0.3) !important;
            border: 2px solid var(--gold) !important;
            border-radius: 50%; width: 90px; height: 90px;
            line-height: 86px; top: 50%; left: 50%;
            margin-top: -45px; margin-left: -45px;
            backdrop-filter: blur(5px);
        }

        .vjs-play-progress, .vjs-volume-level { background-color: var(--gold) !important; }

        /* Navigation & Controls */
        .player-nav, .lock-wrapper {
            position: absolute; z-index: 100;
            opacity: 0; visibility: hidden; transition: 0.4s ease;
        }

        .player-nav { top: env(safe-area-inset-top, 30px); left: 30px; }
        .lock-wrapper { top: 50%; right: 20px; transform: translateY(-50%); }

        .container-active .player-nav, 
        .container-active .lock-wrapper { opacity: 1; visibility: visible; }

        /* Lock State */
        body.is-locked .player-nav,
        body.is-locked .vjs-control-bar,
        body.is-locked .vjs-big-play-button { 
            display: none !important; 
        }

        .btn-ui {
            background: rgba(0, 0, 0, 0.6); color: white;
            border: 1px solid var(--gold); border-radius: 50px;
            backdrop-filter: blur(10px); cursor: pointer; transition: 0.3s;
        }

        .btn-back {
            text-decoration: none; padding: 12px 25px;
            font-family: 'Cinzel', serif; display: flex; align-items: center; gap: 10px;
        }

        .btn-lock {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }

        body.is-locked .lock-wrapper { opacity: 0.3; visibility: visible; }
        body.is-locked .btn-lock { border-color: #ff4444; color: #ff4444; }

        #loader {
            position: fixed; inset: 0; background: var(--black);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000;
        }

        .gold-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid var(--gold); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="container-active">

    <div id="loader">
        <div class="gold-spinner"></div>
        <p style="color: var(--gold); margin-top: 15px; font-family: 'Cinzel'; letter-spacing: 3px; font-size: 0.8rem;">INITIALIZING MASTERPIECE</p>
    </div>

    <nav class="player-nav">
        <a href="javascript:history.back()" class="btn-ui btn-back">
            <i class="fa-solid fa-arrow-left"></i> EXIT THEATER
        </a>
    </nav>

    <div class="lock-wrapper">
        <button class="btn-ui btn-lock" id="lockBtn" title="Hold to Unlock">
            <i class="fa-solid fa-lock-open"></i>
        </button>
    </div>

    <div class="video-container" id="playerWrapper">
        <video id="boda-player" class="video-js vjs-big-play-centered vjs-matrix" crossorigin="anonymous" controls preload="auto"></video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://unpkg.com/@silvermine/videojs-quality-selector/dist/js/silvermine-videojs-quality-selector.min.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoUrl = params.get('video');
        const vttUrl = params.get('vtt');
        const isOffline = params.get('offline') === 'true';

        const player = videojs('boda-player', {
            autoplay: false,
            responsive: true,
            fluid: true,
            playbackRates: [0.5, 1, 1.25, 1.5, 2],
            controlBar: {
                children: [
                    'playToggle', 'volumePanel', 'currentTimeDisplay', 
                    'timeDivider', 'durationDisplay', 'progressControl', 
                    'playbackRateMenuButton', 'subsCapsButton', 'fullscreenToggle',
                ],
            },
        });

        player.controlBar.addChild('QualitySelector');

        if (videoUrl) {
            player.src({
                src: decodeURIComponent(videoUrl),
                type: isOffline ? 'video/mp4' : 'application/x-mpegURL'
            });

            if (vttUrl && vttUrl !== "null" && vttUrl !== "") {
                player.addRemoteTextTrack({
                    kind: 'captions', srclang: 'en', label: 'English',
                    src: decodeURIComponent(vttUrl), default: true
                }, false);
            }
        }

        // --- LANDSCAPE & FULLSCREEN LOGIC ---
        player.on('fullscreenchange', () => {
            if (player.isFullscreen()) {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {
                        console.log("Orientation lock not supported on this browser.");
                    });
                }
            } else {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
        });

        // --- SCREEN LOCK LOGIC ---
        const lockBtn = document.getElementById('lockBtn');
        let isLocked = false;
        let lockTimer;

        lockBtn.addEventListener('click', () => {
            if (!isLocked) {
                isLocked = true;
                document.body.classList.add('is-locked');
                lockBtn.innerHTML = '<i class="fa-solid fa-lock"></i>';
                if (navigator.vibrate) navigator.vibrate(50);
            }
        });

        // Long press to unlock
        const startUnlock = () => {
            if (!isLocked) return;
            lockTimer = setTimeout(() => {
                isLocked = false;
                document.body.classList.remove('is-locked');
                lockBtn.innerHTML = '<i class="fa-solid fa-lock-open"></i>';
                if (navigator.vibrate) navigator.vibrate([50, 50]);
                handleUserActivity();
            }, 2000); // 2 seconds hold
        };

        const cancelUnlock = () => clearTimeout(lockTimer);

        lockBtn.addEventListener('mousedown', startUnlock);
        lockBtn.addEventListener('mouseup', cancelUnlock);
        lockBtn.addEventListener('touchstart', startUnlock);
        lockBtn.addEventListener('touchend', cancelUnlock);

        // --- UI UTILITIES ---
        player.on('ready', () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 500);
        });

        let uiTimer;
        function handleUserActivity() {
            if (isLocked) return;
            document.body.classList.add('container-active');
            clearTimeout(uiTimer);
            uiTimer = setTimeout(() => {
                if (!player.paused()) {
                    document.body.classList.remove('container-active');
                }
            }, 3000);
        }

        window.addEventListener('mousemove', handleUserActivity);
        window.addEventListener('touchstart', handleUserActivity);
        player.on('play', handleUserActivity);
    </script>
</body>
</html>
