<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BODA | Series Library</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --surface: #111111;
            --search-bg: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
        }

        /* Home-Style Search Bar */
        .search-container {
            padding: 20px;
            position: sticky;
            top: 0;
            background: var(--black);
            z-index: 100;
        }

        .home-search {
            background: var(--search-bg);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            backdrop-filter: blur(10px);
        }

        .home-search input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            padding: 8px;
            font-size: 1rem;
            outline: none;
        }

        nav { display: flex; align-items: center; }
        nav a {
            color: white; text-decoration: none; margin: 0 12px;
            font-family: var(--luxury-font); font-size: 0.85rem; transition: 0.3s; text-transform: uppercase;
        }
        nav a i { margin-right: 5px; color: var(--gold); }
        nav a:hover { color: var(--gold); }

        .home-search i { color: var(--gold); margin-right: 10px; }

        /* Filter Section */
        .filter-row {
            padding: 10px 20px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filter-row::-webkit-scrollbar { display: none; }

        .genre-btn {
            background: transparent;
            border: 1px solid #333;
            color: #888;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .genre-btn.active { background: var(--gold); color: black; border-color: var(--gold); }

        /* Series Only Grid */
        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .series-card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            border: 1px solid #222;
            transition: 0.3s;
        }
        .series-card:active { transform: scale(0.95); }

        .backdrop-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #222;
        }
        .backdrop-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        .series-info { padding: 12px; }
        .series-info h3 { margin: 0; font-size: 0.8rem; font-family: 'Cinzel'; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .series-info p { margin: 5px 0 0; font-size: 0.65rem; color: #666; }

        .sort-pill {
            background: #1a1a1a;
            color: var(--gold);
            border: none;
            padding: 8px 15px;
            border-radius: 50px;
            font-family: 'Cinzel';
            font-size: 0.7rem;
            margin: 0 20px;
            outline: none;
        }

        /* Loader */
        #pageLoader {
            position: fixed; inset: 0; background: var(--black);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .spinner { width: 30px; height: 30px; border: 2px solid #222; border-top: 2px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="pageLoader"><div class="spinner"></div></div>

    <div class="search-container">
        <div class="home-search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="seriesSearch" placeholder="Search Series & Shows..." oninput="runSearch()">
        </div>
    </div>

    <nav>
            <a href="index.html"><i class="fa-solid fa-house"></i>Home</a>
            <a href="series.html"><i class="fa-solid fa-tv"></i>Series</a>
            <a href="movies.html"><i class="fa-solid fa-film"></i>Movies</a>
        </nav>

    <div class="filter-row" id="genreList">
        <button class="genre-btn active" onclick="filterGenre('All', this)">All Shows</button>
        <!-- Genres dynamically added -->
    </div>

    <div style="display: flex; justify-content: flex-end;">
        <select class="sort-pill" id="sortOption" onchange="runSearch()">
            <option value="new">Newest First</option>
            <option value="old">Oldest First</option>
        </select>
    </div>

    <div class="series-grid" id="mainGrid"></div>

    <script>
        const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
        const SERIES_BIN = "69f3074faaba882197550749";

        let library = [];
        let selectedGenre = 'All';

        async function fetchSeries() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${SERIES_BIN}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await response.json();
                library = data.record.series || data.record; // Adjust based on your JSON structure
                
                generateGenres();
                runSearch();
                document.getElementById('pageLoader').style.display = 'none';
            } catch (error) {
                console.error("Error fetching bin:", error);
                document.getElementById('pageLoader').innerHTML = "<p style='color:red'>Failed to load library</p>";
            }
        }

        function generateGenres() {
            const genres = ['All', ...new Set(library.map(s => s.genre).filter(Boolean))];
            const container = document.getElementById('genreList');
            container.innerHTML = genres.map(g => `
                <button class="genre-btn ${g === 'All' ? 'active' : ''}" onclick="filterGenre('${g}', this)">${g}</button>
            `).join('');
        }

        function filterGenre(genre, btn) {
            selectedGenre = genre;
            document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            runSearch();
        }

        function runSearch() {
            const query = document.getElementById('seriesSearch').value.toLowerCase();
            const sort = document.getElementById('sortOption').value;
            const grid = document.getElementById('mainGrid');

            let results = library.filter(s => {
                const title = s.title || s.name || "";
                const matchesSearch = title.toLowerCase().includes(query);
                const matchesGenre = selectedGenre === 'All' || s.genre === selectedGenre;
                return matchesSearch && matchesGenre;
            });

            // Sorting by ID or Year (Assuming higher ID = newer)
            results.sort((a, b) => sort === 'new' ? (b.id - a.id) : (a.id - b.id));

            grid.innerHTML = results.map(s => `
                <a href="details.html?id=${s.id}" class="series-card">
                    <div class="backdrop-thumb">
                        <img src="${s.backdrop || s.thumbnail}" onerror="this.src='https://via.placeholder.com/320x180/111/D4AF37?text=BODA'" alt="backdrop">
                    </div>
                    <div class="series-info">
                        <h3>${s.title || s.name}</h3>
                        <p>${s.genre || 'Series'} • ${s.year || ''}</p>
                    </div>
                </a>
            `).join('');
        }

        // Initialize
        fetchSeries();
    </script>
</body>
</html>
