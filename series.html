<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BODA | Series Library</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --surface: #111111;
            --nav-bg: rgba(10, 10, 10, 0.95);
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0 0 80px 0; /* Bottom padding for Nav */
            overflow-x: hidden;
        }

        /* Top Header with Search */
        header {
            position: sticky;
            top: 0;
            background: var(--black);
            z-index: 100;
            padding: 15px 20px;
        }

        .home-search {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50px;
            display: flex;
            align-items: center;
            padding: 8px 18px;
            backdrop-filter: blur(10px);
        }

        .home-search input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            padding: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        .home-search i { color: var(--gold); margin-right: 10px; }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            color: #666;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            transition: 0.3s;
            gap: 4px;
        }

        .nav-item i { font-size: 1.2rem; }
        .nav-item.active { color: var(--gold); }

        /* Genre Sync Row */
        .filter-row {
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filter-row::-webkit-scrollbar { display: none; }

        .genre-btn {
            background: transparent;
            border: 1px solid #222;
            color: #888;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .genre-btn.active { background: var(--gold); color: black; border-color: var(--gold); }

        /* Grid */
        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .series-card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            border: 1px solid #1a1a1a;
        }

        .backdrop-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a1a;
        }
        .backdrop-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        .series-info { padding: 12px; }
        .series-info h3 { 
            margin: 0; font-size: 0.8rem; font-family: 'Cinzel'; color: var(--gold); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .series-info p { margin: 4px 0 0; font-size: 0.65rem; color: #555; }

        .sort-area { display: flex; justify-content: flex-end; padding: 0 20px; }
        .sort-pill {
            background: #111; color: var(--gold); border: 1px solid #222;
            padding: 6px 12px; border-radius: 50px; font-family: 'Cinzel'; font-size: 0.6rem;
        }

        #pageLoader {
            position: fixed; inset: 0; background: var(--black);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .spinner { width: 25px; height: 25px; border: 2px solid #222; border-top: 2px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="pageLoader"><div class="spinner"></div></div>

    <header>
        <div class="home-search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="seriesSearch" placeholder="Search series..." oninput="runSearch()">
        </div>
    </header>

    <div class="filter-row" id="genreList">
        <button class="genre-btn active" onclick="filterGenre('All', this)">All</button>
    </div>

    <div class="sort-area">
        <select class="sort-pill" id="sortOption" onchange="runSearch()">
            <option value="new">Latest</option>
            <option value="old">Oldest</option>
        </select>
    </div>

    <div class="series-grid" id="mainGrid"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="series.html" class="nav-item active">
            <i class="fa-solid fa-tv"></i>
            <span>Series</span>
        </a>
        <a href="movies.html" class="nav-item">
            <i class="fa-solid fa-film"></i>
            <span>Movies</span>
        </a>
    </nav>

    <script>
        const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
        const SERIES_BIN = "69f3074faaba882197550749";

        let library = [];
        let selectedGenre = 'All';

        async function fetchSeries() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${SERIES_BIN}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await response.json();
                library = data.record.series || data.record; //
                
                generateGenres();
                runSearch();
                document.getElementById('pageLoader').style.display = 'none';
            } catch (error) {
                console.error("Fetch error:", error);
            }
        }

        function generateGenres() {
            // This syncs all genres from your bin automatically
            const genres = ['All', ...new Set(library.map(s => s.genre).filter(Boolean))];
            const container = document.getElementById('genreList');
            container.innerHTML = genres.map(g => `
                <button class="genre-btn ${g === 'All' ? 'active' : ''}" onclick="filterGenre('${g}', this)">${g}</button>
            `).join('');
        }

        function filterGenre(genre, btn) {
            selectedGenre = genre;
            document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            runSearch();
        }

        function runSearch() {
            const query = document.getElementById('seriesSearch').value.toLowerCase();
            const sort = document.getElementById('sortOption').value;
            const grid = document.getElementById('mainGrid');

            let results = library.filter(s => {
                const title = (s.title || s.name || "").toLowerCase();
                return title.includes(query) && (selectedGenre === 'All' || s.genre === selectedGenre);
            });

            // Sorting by ID
            results.sort((a, b) => sort === 'new' ? (b.id - a.id) : (a.id - b.id));

            grid.innerHTML = results.map(s => `
                <a href="details.html?id=${s.id}" class="series-card">
                    <div class="backdrop-thumb">
                        <img src="${s.backdrop || s.thumbnail}" onerror="this.src='https://via.placeholder.com/320x180/111/D4AF37?text=BODA'">
                    </div>
                    <div class="series-info">
                        <h3>${s.title || s.name}</h3>
                        <p>${(s.genre || 'Show').toUpperCase()} • ${s.year || '2026'}</p>
                    </div>
                </a>
            `).join('');
        }

        fetchSeries();
    </script>
</body>
</html>
