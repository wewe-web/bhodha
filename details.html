<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | Details</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --gray: #111;
            --light-gray: #1a1a1a;
            --luxury-font: 'Cinzel', serif;
            --main-font: 'Poppins', sans-serif;
        }

        body {
            background: var(--black);
            color: white;
            font-family: var(--main-font);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-family: var(--luxury-font);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .hero-container {
            width: 100%;
            height: 70vh;
            position: relative;
            background-color: #000;
            background-size: cover;
            background-position: center;
        }

        .hero-media {
            width: 100%;
            height: 100%;
            border: none;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--black) 5%, transparent 40%),
                        linear-gradient(to right, var(--black) 10%, transparent 60%);
        }

        .details-content {
            padding: 0 5% 100px;
            margin-top: -150px;
            position: relative;
            z-index: 10;
        }

        .status-badge {
            display: inline-block;
            background: var(--gold);
            color: black;
            padding: 4px 12px;
            border-radius: 2px;
            font-weight: 800;
            font-size: 0.7rem;
            margin-bottom: 15px;
            font-family: var(--luxury-font);
            text-transform: uppercase;
        }

        .main-title {
            font-family: var(--luxury-font);
            font-size: clamp(2.2rem, 8vw, 4.5rem);
            margin: 0 0 15px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        .meta-info {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            color: #ccc;
            font-size: 0.9rem;
        }

        .synopsis {
            max-width: 700px;
            line-height: 1.7;
            color: #ddd;
            margin-bottom: 40px;
        }

        .episode-container { margin-top: 60px; }

        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .row-header h3 {
            font-family: var(--luxury-font);
            color: var(--gold);
            margin: 0;
            letter-spacing: 2px;
        }

        .ep-item {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 25px;
            padding: 20px;
            border-bottom: 1px solid #1a1a1a;
            transition: 0.3s;
            cursor: pointer;
            align-items: center;
        }

        .ep-item:hover { background: #0d0d0d; }

        .ep-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ep-thumb i { font-size: 2.5rem; color: rgba(255,255,255,0.8); }

        .ep-info h4 { margin: 0 0 8px; font-size: 1.1rem; color: var(--gold); }
        .ep-info p { margin: 0; color: #888; font-size: 0.9rem; line-height: 1.5; }

        @media (max-width: 768px) {
            .hero-container { height: 55vh; }
            .details-content { margin-top: -80px; text-align: center; }
            .meta-info { justify-content: center; }
            .ep-item { grid-template-columns: 1fr; gap: 10px; padding: 15px 0; }
            .ep-info { text-align: left; padding: 0 5px; }
            .synopsis { font-size: 0.9rem; }
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <div class="back-btn" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i> BACK</div>
    </nav>

    <div id="loader" style="height: 100vh; display: flex; flex-direction:column; align-items: center; justify-content: center; background: #000; gap: 20px;">
        <i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--gold);"></i>
        <span style="font-family:var(--luxury-font); color:var(--gold); letter-spacing:2px; font-size:0.8rem;">LOADING CINEMA</span>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="hero-container" id="hero-media-container">
            <div class="hero-overlay"></div>
        </div>

        <div class="details-content">
            <div id="status-target"></div>
            <h1 class="main-title" id="title-target"></h1>
            <div class="meta-info" id="meta-target"></div>
            <p class="synopsis" id="synopsis-target"></p>

            <div id="action-target"></div>

            <div class="episode-container" id="episode-section" style="display:none;">
                <div class="row-header">
                    <h3>Episodes</h3>
                    <select id="season-selector" onchange="renderEpisodes(this.value)" style="background:#000; color:var(--gold); border:1px solid var(--gold); padding:5px 10px; font-family:var(--main-font); border-radius:4px;"></select>
                </div>
                <div id="ep-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
        const BINS = ["69f3074faaba882197550749", "69f307c736566621a80b4134"];

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const title = params.get('title');
            
            if (!title) {
                window.location.href = 'index.html';
                return;
            }

            try {
                // Fetch data from both bins
                const fetches = BINS.map(id => 
                    fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {
                        headers: { 'X-Master-Key': API_KEY }
                    }).then(r => r.ok ? r.json() : null)
                );

                const responses = await Promise.all(fetches);
                
                // Merge records and find the item
                const allItems = responses
                    .filter(r => r && r.record)
                    .flatMap(r => Array.isArray(r.record) ? r.record : []);
                
                const item = allItems.find(i => i.title === title);

                if (item) {
                    renderPage(item);
                } else {
                    alert("Content not found.");
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error("Initialization Error:", err);
                document.getElementById('loader').innerHTML = `<p style="color:red;">Error loading content. Please refresh.</p>`;
            }
        }

        function renderPage(item) {
            window.currentData = item;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';

            const mediaContainer = document.getElementById('hero-media-container');
            
            // Handle Trailer or Backdrop
            if (item.trailerLink && item.trailerLink.includes('youtube')) {
                const videoId = item.trailerLink.split('v=')[1]?.split('&')[0] || item.trailerLink.split('/').pop();
                mediaContainer.innerHTML = `
                    <iframe class="hero-media" 
                        src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${videoId}&rel=0" 
                        allow="autoplay; encrypted-media">
                    </iframe>
                    <div class="hero-overlay"></div>`;
            } else {
                mediaContainer.style.backgroundImage = `url('${item.backdrop || item.cover}')`;
            }

            document.getElementById('title-target').innerText = item.title;
            document.getElementById('status-target').innerHTML = `<span class="status-badge">${item.status || 'RELEASED'}</span>`;
            document.getElementById('synopsis-target').innerText = item.synopsis || "No synopsis available.";
            
            document.getElementById('meta-target').innerHTML = `
                <span>${item.year || '2026'}</span>
                <span style="color:var(--gold)">|</span>
                <span>${item.genres ? item.genres.join(' • ') : 'Featured'}</span>
            `;

            // Check if it's a Series or Movie
            if (item.seasonsData || item.episodes) {
                document.getElementById('episode-section').style.display = 'block';
                setupSeasons(item);
            } else {
                document.getElementById('action-target').innerHTML = `
                    <button onclick="window.location.href='watch.html?video=${encodeURIComponent(item.videoLink)}'" 
                            style="background:white; color:black; border:none; padding:15px 45px; font-weight:700; cursor:pointer; font-family:var(--luxury-font); border-radius:2px; display:flex; align-items:center; gap:10px; margin: 0 auto;">
                        <i class="fa-solid fa-play"></i> PLAY NOW
                    </button>`;
            }
        }

        function setupSeasons(item) {
            const selector = document.getElementById('season-selector');
            if (item.seasonsData && Array.isArray(item.seasonsData)) {
                selector.innerHTML = item.seasonsData.map(s => 
                    `<option value="${s.seasonNumber}">Season ${s.seasonNumber}</option>`
                ).join('');
                renderEpisodes(item.seasonsData[0].seasonNumber);
            } else {
                selector.style.display = 'none';
                renderEpisodes(1);
            }
        }

        function renderEpisodes(seasonNum) {
            const list = document.getElementById('ep-list');
            let eps = [];
            
            if (window.currentData.seasonsData) {
                const s = window.currentData.seasonsData.find(x => x.seasonNumber == seasonNum);
                eps = s ? s.episodes : [];
            } else {
                eps = window.currentData.episodes || [];
            }

            if (!eps || eps.length === 0) {
                list.innerHTML = `<p style="padding:20px; color:#666;">No episodes available for this season yet.</p>`;
                return;
            }

            list.innerHTML = eps.map((ep, i) => `
                <div class="ep-item" onclick="window.location.href='watch.html?video=${encodeURIComponent(ep.link)}'">
                    <div class="ep-thumb" style="background-image:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('${ep.thumbnail || window.currentData.cover}')">
                        <i class="fa-solid fa-circle-play"></i>
                    </div>
                    <div class="ep-info">
                        <h4>${i+1}. ${ep.title || 'Episode ' + (i+1)}</h4>
                        <p>${ep.description || 'Watch the latest installment of ' + window.currentData.title + '.'}</p>
                    </div>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
