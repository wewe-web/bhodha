<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | Loading...</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --gray: #111;
            --light-gray: #1a1a1a;
            --luxury-font: 'Cinzel', serif;
            --main-font: 'Poppins', sans-serif;
        }

        body {
            background: var(--black);
            color: white;
            font-family: var(--main-font);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 5%;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 50px;
            font-family: var(--luxury-font);
            font-size: 0.8rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* Hero Section */
        .hero-bg {
            width: 100%;
            height: 55vh;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--black) 5%, rgba(5, 5, 5, 0.4) 50%, rgba(5, 5, 5, 0.1) 100%);
        }

        /* Responsive Grid */
        .details-wrapper {
            max-width: 1200px;
            margin: -100px auto 0;
            padding: 0 20px 80px;
            position: relative;
            z-index: 10;
        }

        .main-info {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }

        .poster-art img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .header-text h1 {
            font-family: var(--luxury-font);
            font-size: 3.5rem;
            margin: 0 0 10px;
            line-height: 1.1;
        }

        .meta-chips {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .chip {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Episodes Styling */
        .content-section {
            margin-top: 40px;
        }

        .section-title {
            font-family: var(--luxury-font);
            color: var(--gold);
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .season-select {
            background: var(--gray);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 5px 15px;
            border-radius: 5px;
            font-family: var(--main-font);
            cursor: pointer;
        }

        .episode-card {
            background: var(--light-gray);
            border: 1px solid #222;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .episode-card:hover {
            border-color: var(--gold);
            background: #222;
        }

        .ep-meta { flex-grow: 1; padding-right: 20px; }
        .ep-meta h4 { margin: 0 0 5px; color: #fff; font-size: 1.1rem; cursor: pointer; }
        .ep-meta h4:hover { color: var(--gold); }
        .ep-meta p { margin: 0; color: #888; font-size: 0.85rem; line-height: 1.4; }

        .ep-btns { display: flex; gap: 15px; }
        .ep-dl-btn { background: none; border: none; color: #555; font-size: 1.3rem; cursor: pointer; transition: 0.2s; }
        .ep-dl-btn:hover { color: var(--gold); transform: scale(1.1); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hero-bg { height: 40vh; }
            .details-wrapper { margin-top: -50px; padding: 0 15px 50px; }
            .main-info { grid-template-columns: 1fr; gap: 20px; }
            .poster-art { display: none; } /* Hide poster on mobile for cleaner look */
            .header-text h1 { font-size: 2.2rem; text-align: center; }
            .meta-chips { justify-content: center; }
            .episode-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .ep-btns { width: 100%; justify-content: space-between; border-top: 1px solid #333; pt: 10px; }
        }
    </style>
</head>

<body>

    <div id="page-content">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--gold);">
            <i class="fas fa-circle-notch fa-spin fa-2x"></i>
        </div>
    </div>

    <script>
        const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
        const SERIES_BIN = "69f3074faaba882197550749";
        const MOVIES_BIN = "69f307c736566621a80b4134";

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const title = params.get('title');
            if (!title) { window.location.href = 'index.html'; return; }

            try {
                const [sRes, mRes] = await Promise.all([
                    fetch(`https://api.jsonbin.io/v3/b/${SERIES_BIN}/latest`, { headers: { 'X-Master-Key': API_KEY } }),
                    fetch(`https://api.jsonbin.io/v3/b/${MOVIES_BIN}/latest`, { headers: { 'X-Master-Key': API_KEY } })
                ]);
                const sData = await sRes.json();
                const mData = await mRes.json();
                
                const allItems = [...(sData.record || []), ...(mData.record || [])];
                const item = allItems.find(i => i.title === title);
                const isSeries = (sData.record || []).some(i => i.title === title);

                if (item) renderItem(item, isSeries);
            } catch (err) { console.error("BODA Load Error", err); }
        }

        function renderItem(item, isSeries) {
            const container = document.getElementById('page-content');
            
            // Build Season Logic
            let seasonHTML = '';
            if (isSeries && item.seasonsData) {
                seasonHTML = `
                    <div class="content-section">
                        <div class="section-title">
                            <h3>Episodes</h3>
                            <select class="season-select" onchange="changeSeason(this.value)">
                                ${item.seasonsData.map(s => `<option value="${s.seasonNumber}">Season ${s.seasonNumber}</option>`).join('')}
                            </select>
                        </div>
                        <div id="ep-list-target"></div>
                    </div>`;
            } else if (isSeries && item.episodes) {
                // Fallback for old data structure
                seasonHTML = `<div class="content-section"><div class="section-title"><h3>Episodes</h3></div><div id="ep-list-target"></div></div>`;
            } else {
                // Movie Layout
                seasonHTML = `
                    <div class="content-section" style="text-align:center;">
                        <button class="chip" style="padding: 15px 40px; font-size:1rem; cursor:pointer;" onclick="watch('${item.videoLink}')">
                            <i class="fa-solid fa-play"></i> WATCH NOW
                        </button>
                        <button class="chip" style="padding: 15px 40px; font-size:1rem; cursor:pointer; background:transparent; margin-left:10px;" 
                                onclick="saveVideo('${item.downloadLink}', '${item.title}')">
                            <i class="fa-solid fa-download"></i> SAVE
                        </button>
                    </div>`;
            }

            container.innerHTML = `
                <nav class="top-nav"><a href="index.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i> HOME</a></nav>
                <div class="hero-bg" style="background-image: url('${item.backdrop}')"><div class="hero-overlay"></div></div>
                
                <div class="details-wrapper">
                    <div class="main-info">
                        <div class="poster-art"><img src="${item.cover}"></div>
                        <div class="header-text">
                            <div class="meta-chips">
                                <span class="chip">${isSeries ? 'Series' : 'Movie'}</span>
                                ${item.genres.map(g => `<span class="chip" style="border:none; background:rgba(255,255,255,0.05); color:#aaa;">${g}</span>`).join('')}
                            </div>
                            <h1>${item.title}</h1>
                            <p style="color:#aaa; line-height:1.6;">${item.synopsis || 'No synopsis available.'}</p>
                            ${seasonHTML}
                        </div>
                    </div>
                </div>`;

            if (isSeries) {
                window.currentItem = item; // Store globally for switching
                renderEpisodes(1);
            }
        }

        function renderEpisodes(seasonNum) {
            const target = document.getElementById('ep-list-target');
            let eps = [];
            
            if (window.currentItem.seasonsData) {
                const season = window.currentItem.seasonsData.find(s => s.seasonNumber == seasonNum);
                eps = season ? season.episodes : [];
            } else {
                eps = window.currentItem.episodes || [];
            }

            target.innerHTML = eps.map((ep, i) => `
                <div class="episode-card">
                    <div class="ep-meta">
                        <h4 onclick="watch('${ep.link}')">E${i+1}: ${ep.title || 'Untitled Episode'}</h4>
                        <p>${ep.description || 'Watch the latest installment of this masterpiece.'}</p>
                    </div>
                    <div class="ep-btns">
                        <button class="ep-dl-btn" onclick="saveVideo('${ep.download}', '${window.currentItem.title} S${seasonNum}E${i+1}')">
                            <i class="fa-solid fa-circle-arrow-down"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function changeSeason(val) { renderEpisodes(val); }

        function watch(link) { window.location.href = `watch.html?video=${encodeURIComponent(link)}`; }

        async function saveVideo(url, title) {
            if (!url || url === 'undefined') { alert("Download link unavailable."); return; }
            
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({ type: 'CACHE_VIDEO', url, title });
                alert(`Starting download: ${title}`);
            } else {
                alert("Please refresh and try again.");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
