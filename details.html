<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BODA LUXE | Details</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --gray: #111;
            --luxury-font: 'Cinzel', serif;
            --main-font: 'Poppins', sans-serif;
        }

        body {
            background: var(--black);
            color: white;
            font-family: var(--main-font);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-family: var(--luxury-font);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            width: fit-content;
        }

        .hero-container {
            width: 100%;
            height: 75vh;
            position: relative;
            background-color: #000;
            background-size: cover;
            background-position: center;
        }

        .hero-media { width: 100%; height: 100%; border: none; }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--black) 5%, transparent 40%),
                        linear-gradient(to right, var(--black) 10%, transparent 60%);
        }

        .details-content {
            padding: 0 5% 100px;
            margin-top: -150px;
            position: relative;
            z-index: 10;
        }

        .status-badge {
            display: inline-block;
            background: var(--gold);
            color: black;
            padding: 4px 12px;
            border-radius: 2px;
            font-weight: 800;
            font-size: 0.7rem;
            margin-bottom: 15px;
            font-family: var(--luxury-font);
            text-transform: uppercase;
        }

        .main-title {
            font-family: var(--luxury-font);
            font-size: clamp(2.2rem, 8vw, 4.5rem);
            margin: 0 0 15px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
            line-height: 1;
        }

        .meta-info {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            color: #ccc;
            font-size: 0.9rem;
        }

        .synopsis {
            max-width: 700px;
            line-height: 1.7;
            color: #ddd;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .watch-btn {
            background: white;
            color: black;
            border: none;
            padding: 16px 45px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--luxury-font);
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            text-decoration: none;
        }

        .watch-btn:hover { background: var(--gold); transform: scale(1.05); }

        .episode-container { margin-top: 60px; }

        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .row-header h3 {
            font-family: var(--luxury-font);
            color: var(--gold);
            margin: 0;
            letter-spacing: 2px;
        }

        .ep-item {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 25px;
            padding: 20px;
            border-bottom: 1px solid #1a1a1a;
            transition: 0.3s;
            cursor: pointer;
            align-items: center;
            border-radius: 8px;
        }

        .ep-item:hover { background: #111; }

        .ep-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .ep-thumb::after {
            content: '\f04b';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 1.5rem;
            color: white;
            z-index: 2;
            opacity: 0;
            transition: 0.3s;
        }

        .ep-item:hover .ep-thumb::after { opacity: 1; }

        .ep-info h4 { margin: 0 0 5px; font-size: 1.1rem; color: #fff; }
        .ep-info p { margin: 0; color: #888; font-size: 0.85rem; }

        @media (max-width: 768px) {
            .hero-container { height: 55vh; }
            .details-content { margin-top: -80px; text-align: center; }
            .meta-info { justify-content: center; }
            .ep-item { grid-template-columns: 1fr; gap: 15px; padding: 15px 0; }
            .ep-info { text-align: left; }
            .synopsis { margin: 0 auto 30px; }
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <div class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> BACK</div>
    </nav>

    <div id="loader" style="height: 100vh; display: flex; flex-direction:column; align-items: center; justify-content: center; background: #000; gap: 20px;">
        <i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--gold);"></i>
        <span style="font-family:var(--luxury-font); color:var(--gold); letter-spacing:2px; font-size:0.8rem;">PREPARING YOUR VIEWING</span>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="hero-container" id="hero-media-container">
            <div class="hero-overlay"></div>
        </div>

        <div class="details-content">
            <div id="status-target"></div>
            <h1 class="main-title" id="title-target"></h1>
            <div class="meta-info" id="meta-target"></div>
            <p class="synopsis" id="synopsis-target"></p>

            <div id="movie-action" style="display:none;">
                <a href="#" id="movie-play-link" class="watch-btn">
                    <i class="fa-solid fa-play"></i> WATCH MASTERPIECE
                </a>
            </div>

            <div class="episode-container" id="series-action" style="display:none;">
                <div class="row-header">
                    <h3>EPISODES</h3>
                    <span id="ep-total-count" style="color: #666; font-size: 0.8rem;"></span>
                </div>
                <div id="ep-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86';
        const BINS = ['69f3074faaba882197550749', '69f307c736566621a80b4134'];

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const itemId = urlParams.get('id');

            if (!itemId) { window.location.href = 'index.html'; return; }

            try {
                const fetches = BINS.map(id => 
                    fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {
                        headers: { 'X-Master-Key': API_KEY }
                    }).then(r => r.json())
                );

                const results = await Promise.all(fetches);
                const allData = results.flatMap(r => r.record);
                const item = allData.find(i => i.id == itemId);

                if (item) renderPage(item);
                else { alert("Content not found"); window.location.href = 'index.html'; }
            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('loader').innerHTML = `<p style="color:var(--gold);">Connection Lost. Refreshing...</p>`;
            }
        }

        function renderPage(item) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';

            // 1. Hero Media (Trailer or Backdrop)
            const mediaContainer = document.getElementById('hero-media-container');
            if (item.trailer && item.trailer.includes('youtube.com')) {
                const vidId = item.trailer.split('v=')[1]?.split('&')[0];
                mediaContainer.innerHTML = `
                    <iframe class="hero-media" 
                        src="https://www.youtube.com/embed/${vidId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${vidId}" 
                        allow="autoplay"></iframe>
                    <div class="hero-overlay"></div>`;
            } else {
                mediaContainer.style.backgroundImage = `url('${item.backdrop || item.cover}')`;
            }

            // 2. Text Info
            document.getElementById('title-target').innerText = item.title;
            document.getElementById('status-target').innerHTML = `<span class="status-badge">${item.status || 'AVAILABLE'}</span>`;
            document.getElementById('synopsis-target').innerText = item.synopsis || "No synopsis provided for this masterpiece.";
            document.getElementById('meta-target').innerHTML = `
                <span>${item.year}</span>
                <span style="color:var(--gold)">|</span>
                <span>${item.category}</span>
                <span style="color:var(--gold)">|</span>
                <span>${(item.genres || []).join(' • ')}</span>
            `;

            // 3. Action Logic (Movie vs Series)
            if (item.category === 'Movie') {
                document.getElementById('movie-action').style.display = 'block';
                // Pass Title and ID to watch.html so it can fetch the correct bin
                document.getElementById('movie-play-link').href = `watch.html?id=${item.id}&type=movie`;
            } else {
                document.getElementById('series-action').style.display = 'block';
                renderEpisodes(item);
            }
        }

        function renderEpisodes(item) {
            const list = document.getElementById('ep-list');
            const epCountSpan = document.getElementById('ep-total-count');
            const eps = item.episodes || [];
            
            epCountSpan.innerText = `${eps.length} Episodes Total`;
            
            list.innerHTML = eps.map((ep, index) => `
                <div class="ep-item" onclick="window.location.href='watch.html?id=${item.id}&ep=${index}'">
                    <div class="ep-thumb" style="background-image: url('${item.backdrop || item.cover}')"></div>
                    <div class="ep-info">
                        <h4>${ep.title || 'Episode ' + (index + 1)}</h4>
                        <p>Stream ${item.title} in Ultra High Definition. BODA Exclusive Player.</p>
                    </div>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
