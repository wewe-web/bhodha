<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA | Details</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --gray: #111;
            --light-gray: #1a1a1a;
            --luxury-font: 'Cinzel', serif;
            --main-font: 'Poppins', sans-serif;
        }

        body {
            background: var(--black);
            color: white;
            font-family: var(--main-font);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Navigation */
        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-family: var(--luxury-font);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Cinematic Hero Wrapper */
        .hero-container {
            width: 100%;
            height: 70vh;
            position: relative;
            background-color: #000;
        }

        .hero-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--black) 5%, transparent 40%),
                        linear-gradient(to right, var(--black) 10%, transparent 60%);
        }

        /* Details Content */
        .details-content {
            padding: 0 5% 100px;
            margin-top: -150px;
            position: relative;
            z-index: 10;
        }

        .status-badge {
            display: inline-block;
            background: var(--gold);
            color: black;
            padding: 4px 12px;
            border-radius: 2px;
            font-weight: 800;
            font-size: 0.7rem;
            margin-bottom: 15px;
            font-family: var(--luxury-font);
        }

        .main-title {
            font-family: var(--luxury-font);
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0 0 15px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .meta-info {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            color: #ccc;
            font-size: 0.9rem;
        }

        .synopsis {
            max-width: 700px;
            line-height: 1.7;
            color: #ddd;
            margin-bottom: 40px;
        }

        /* Episode List (Netflix Style) */
        .episode-container {
            margin-top: 60px;
        }

        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .row-header h3 {
            font-family: var(--luxury-font);
            color: var(--gold);
            margin: 0;
            letter-spacing: 2px;
        }

        .ep-item {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 25px;
            padding: 20px;
            border-bottom: 1px solid #1a1a1a;
            transition: background 0.3s;
            cursor: pointer;
            align-items: center;
        }

        .ep-item:hover { background: #0d0d0d; }

        .ep-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ep-thumb i { font-size: 2rem; opacity: 0; transition: 0.3s; }
        .ep-item:hover .ep-thumb i { opacity: 1; }

        .ep-info h4 { margin: 0 0 8px; font-size: 1.1rem; }
        .ep-info p { margin: 0; color: #888; font-size: 0.9rem; line-height: 1.5; }

        /* Mobile Fixes */
        @media (max-width: 768px) {
            .hero-container { height: 50vh; }
            .details-content { margin-top: -50px; text-align: center; }
            .meta-info { justify-content: center; }
            .ep-item { grid-template-columns: 1fr; gap: 15px; padding: 15px 0; }
            .ep-thumb { width: 100%; }
            .ep-info { text-align: left; padding: 0 10px; }
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> BACK</a>
    </nav>

    <div id="loader" style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #000;">
        <i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--gold);"></i>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="hero-container" id="hero-media-container">
            <!-- Backdrop or Trailer Inject Here -->
            <div class="hero-overlay"></div>
        </div>

        <div class="details-content">
            <div id="status-target"></div>
            <h1 class="main-title" id="title-target"></h1>
            <div class="meta-info" id="meta-target"></div>
            <p class="synopsis" id="synopsis-target"></p>

            <div id="action-target"></div>

            <div class="episode-container" id="episode-section" style="display:none;">
                <div class="row-header">
                    <h3>Episodes</h3>
                    <select id="season-selector" class="season-select" style="background:#000; color:var(--gold); border:1px solid var(--gold); padding:5px 10px;" onchange="renderEpisodes(this.value)"></select>
                </div>
                <div id="ep-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
        const BINS = ["69f307faaba882197550749", "69f307c736566621a80b4134"];

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const title = params.get('title');
            if (!title) { window.location.href = 'index.html'; return; }

            try {
                const results = await Promise.all(BINS.map(id => 
                    fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, { headers: { 'X-Master-Key': API_KEY } }).then(r => r.json())
                ));
                
                const allItems = results.flatMap(r => r.record || []);
                const item = allItems.find(i => i.title === title);

                if (item) renderPage(item);
            } catch (err) { console.error(err); }
        }

        function renderPage(item) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';

            // Media Logic: Trailer vs Backdrop
            const mediaContainer = document.getElementById('hero-media-container');
            if (item.trailerLink) {
                const videoId = item.trailerLink.split('v=')[1] || item.trailerLink.split('/').pop();
                mediaContainer.innerHTML = `
                    <iframe class="hero-media" src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${videoId}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    <div class="hero-overlay"></div>`;
            } else {
                mediaContainer.style.backgroundImage = `url('${item.backdrop}')`;
                mediaContainer.style.backgroundSize = 'cover';
                mediaContainer.style.backgroundPosition = 'center';
            }

            document.getElementById('title-target').innerText = item.title;
            document.getElementById('status-target').innerHTML = `<span class="status-badge">${item.status || 'RELEASED'}</span>`;
            document.getElementById('synopsis-target').innerText = item.synopsis || "No description available.";
            document.getElementById('meta-target').innerHTML = `
                <span>${item.year || '2026'}</span>
                <span>|</span>
                <span>${item.genres ? item.genres.join(', ') : 'Cinema'}</span>
            `;

            if (item.seasonsData || item.episodes) {
                document.getElementById('episode-section').style.display = 'block';
                window.currentData = item;
                setupSeasons(item);
            } else {
                document.getElementById('action-target').innerHTML = `
                    <button onclick="window.location.href='watch.html?video=${encodeURIComponent(item.videoLink)}'" 
                            style="background:white; color:black; border:none; padding:15px 50px; font-weight:700; cursor:pointer; font-family:var(--luxury-font);">
                        <i class="fa-solid fa-play"></i> PLAY MOVIE
                    </button>`;
            }
        }

        function setupSeasons(item) {
            const selector = document.getElementById('season-selector');
            if (item.seasonsData) {
                selector.innerHTML = item.seasonsData.map(s => `<option value="${s.seasonNumber}">Season ${s.seasonNumber}</option>`).join('');
                renderEpisodes(item.seasonsData[0].seasonNumber);
            } else {
                selector.style.display = 'none';
                renderEpisodes(1);
            }
        }

        function renderEpisodes(seasonNum) {
            const list = document.getElementById('ep-list');
            let eps = [];
            
            if (window.currentData.seasonsData) {
                const s = window.currentData.seasonsData.find(x => x.seasonNumber == seasonNum);
                eps = s ? s.episodes : [];
            } else {
                eps = window.currentData.episodes || [];
            }

            list.innerHTML = eps.map((ep, i) => `
                <div class="ep-item" onclick="window.location.href='watch.html?video=${encodeURIComponent(ep.link)}'">
                    <div class="ep-thumb" style="background-image:url('${ep.thumbnail || window.currentData.cover}')">
                        <i class="fa-solid fa-play-circle"></i>
                    </div>
                    <div class="ep-info">
                        <h4>${i+1}. ${ep.title || 'Episode ' + (i+1)}</h4>
                        <p>${ep.description || 'Watch the next chapter of ' + window.currentData.title + '.'}</p>
                    </div>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
