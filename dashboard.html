<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BODA ADMIN | Studio Dashboard</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --gray: #121212;
            --danger: #ff4d4d;
            --success: #00ff88;
        }

        body {
            background: var(--black);
            color: #e0e0e0;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 100px;
        }

        /* Header Styling */
        header {
            background: linear-gradient(to bottom, #111, var(--black));
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
        }

        h1, h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 { font-size: 2rem; text-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        h2 { font-size: 1.2rem; margin-top: 10px; color: #888; }

        .admin-container {
            max-width: 1100px;
            margin: auto;
            padding: 0 20px;
        }

        /* Library List Styling */
        .content-manager {
            background: var(--gray);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #222;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #181818;
            padding: 18px 25px;
            margin-bottom: 12px;
            border-radius: 8px;
            transition: 0.3s ease;
            border: 1px solid transparent;
        }

        .list-item:hover {
            border-color: var(--gold);
            background: #202020;
            transform: translateX(5px);
        }

        .item-info { cursor: pointer; flex-grow: 1; }
        .item-info h4 { margin: 0; color: #fff; font-size: 1.1rem; }
        .item-info .badge {
            font-size: 0.65rem;
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 5px;
            display: inline-block;
        }

        .action-btns { display: flex; gap: 15px; }
        .action-btn { 
            background: none; border: none; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
        }
        .edit-btn { color: #555; }
        .edit-btn:hover { color: var(--gold); }
        .delete-btn { color: #444; }
        .delete-btn:hover { color: var(--danger); }

        /* Floating Add Button */
        .add-toggle {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--gold);
            color: black;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            z-index: 100;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .add-toggle:hover { transform: scale(1.1) rotate(90deg); }

        /* Form Styling */
        #uploadSection {
            display: none;
            background: var(--gray);
            border-radius: 12px;
            padding: 40px;
            margin-top: 30px;
            border: 1px solid var(--gold);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 25px; }
        .form-group.full { grid-column: span 2; }

        label { display: block; margin-bottom: 10px; color: var(--gold); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        input, textarea, select {
            width: 100%; padding: 14px; background: #000; border: 1px solid #333;
            color: white; border-radius: 6px; box-sizing: border-box; font-family: 'Poppins';
        }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }

        .episode-card {
            background: #000; border: 1px solid #222; padding: 20px;
            margin-bottom: 15px; border-radius: 8px; border-left: 4px solid var(--gold);
        }

        .btn-gold {
            background: var(--gold); color: black; padding: 18px; border: none;
            font-weight: bold; cursor: pointer; font-family: 'Cinzel'; width: 100%;
            border-radius: 6px; font-size: 1rem; transition: 0.3s;
        }
        .btn-gold:hover { background: #fff; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: span 1; }
            .admin-container { padding: 0 15px; }
        }
    </style>
</head>

<body>

    <header>
        <h1>BODA STUDIO</h1>
        <h2>Cloud Content Architect</h2>
    </header>

    <div class="admin-container">
        <div class="content-manager">
            <div class="list-header">
                <h3 style="margin:0; font-family:'Cinzel';">Vault Library</h3>
                <span id="libraryCount" style="color:#666; font-size:0.8rem;">0 ITEMS</span>
            </div>
            <div id="libraryList">
                <p style="text-align:center; color:#444; padding: 40px;">Initializing secure connection...</p>
            </div>
        </div>

        <div id="uploadSection">
            <h2 id="formTitle" style="text-align:center; margin-bottom:40px;">Upload Masterpiece</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label>Post Category</label>
                    <select id="mediaType" onchange="toggleFields()">
                        <option value="series">Television Series</option>
                        <option value="movie">Feature Film</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Production Title</label>
                    <input type="text" id="title" placeholder="e.g. The Last Kingdom" required>
                </div>

                <div class="form-group full">
                    <label>Story Synopsis</label>
                    <textarea id="synopsis" rows="4" placeholder="Briefly describe the plot..."></textarea>
                </div>

                <div class="form-group">
                    <label>Poster Image (URL)</label>
                    <input type="text" id="cover" placeholder="Link to vertical poster">
                </div>
                <div class="form-group">
                    <label>Wide Backdrop (URL)</label>
                    <input type="text" id="backdrop" placeholder="Link to horizontal background">
                </div>

                <div class="form-group">
                    <label>YouTube Trailer (URL)</label>
                    <input type="text" id="trailerLink" placeholder="Link for auto-play header">
                </div>
                <div class="form-group">
                    <label>Genres</label>
                    <input type="text" id="genres" placeholder="Action, Drama, Sci-Fi">
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option>Ongoing</option>
                        <option>Upcoming</option>
                        <option>Completed</option>
                        <option>BODA Original</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Promote to Billboard Banner?</label>
                    <select id="isHero">
                        <option value="NO">NO</option>
                        <option value="YES">YES</option>
                    </select>
                </div>
            </div>

            <div id="seriesFields">
                <div class="form-grid">
                    <div class="form-group"><label>Season Count</label><input type="number" id="seasons" value="1"></div>
                    <div class="form-group"><label>Total Episode Count</label><input type="number" id="totalEpisodes" placeholder="Total available"></div>
                </div>
                <div id="episodeList">
                    <label style="margin-top:20px; display:block;">Episode Manifest</label>
                </div>
                <button type="button" class="btn-gold" style="background: #222; color: var(--gold); font-size: 0.8rem; margin-bottom:30px;" onclick="addEpisode()">+ New Episode Entry</button>
            </div>

            <div id="movieFields" style="display:none;">
                <div class="form-group"><label>Stream Source (m3u8/mp4)</label><input type="text" id="movieLink"></div>
                <div class="form-group"><label>Download Source (Direct Link)</label><input type="text" id="movieDownload" style="background:#111;"></div>
                <div class="form-group"><label>Captions (VTT/SRT)</label><textarea id="movieVtt"></textarea></div>
                <div class="form-group"><label>Release Date</label><input type="date" id="movieDate"></div>
            </div>

            <button id="saveBtn" class="btn-gold" onclick="saveToBoda()">SYCN WITH BODA CLOUD</button>
            <button class="btn-gold" style="background:transparent; color:#555;" onclick="hideForm()">DISCARD CHANGES</button>
        </div>
    </div>

    <div class="add-toggle" onclick="showForm()" title="New Upload">+</div>

    <script>
        const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
        const SERIES_BIN = "69f3074faaba882197550749";
        const MOVIES_BIN = "69f307c736566621a80b4134";
        
        let fullLibrary = { series: [], movies: [] };
        let editingId = null;

        async function fetchLibrary() {
            try {
                const [sRes, mRes] = await Promise.all([
                    fetch(`https://api.jsonbin.io/v3/b/${SERIES_BIN}/latest`, { headers: { 'X-Master-Key': API_KEY }}),
                    fetch(`https://api.jsonbin.io/v3/b/${MOVIES_BIN}/latest`, { headers: { 'X-Master-Key': API_KEY }})
                ]);
                const sData = await sRes.json();
                const mData = await mRes.json();
                fullLibrary.series = Array.isArray(sData.record) ? sData.record : [sData.record];
                fullLibrary.movies = Array.isArray(mData.record) ? mData.record : [mData.record];
                renderLibrary();
            } catch (err) { console.error("Library Load Failed", err); }
        }

        function renderLibrary() {
            const container = document.getElementById('libraryList');
            container.innerHTML = "";
            const merged = [...fullLibrary.series, ...fullLibrary.movies];
            document.getElementById('libraryCount').innerText = `${merged.length} PRODUCTIONS`;

            merged.forEach((item) => {
                if(!item.title) return;
                const type = fullLibrary.series.includes(item) ? 'series' : 'movie';
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="item-info" onclick="editItem('${type}', '${item.title}')">
                        <h4>${item.title}</h4>
                        <div class="badge">${type} • ${item.status || 'Archived'}</div>
                    </div>
                    <div class="action-btns">
                        <button class="action-btn edit-btn" onclick="editItem('${type}', '${item.title}')"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="action-btn delete-btn" onclick="deleteItem('${type}', '${item.title}')"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function showForm() {
            editingId = null;
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('formTitle').innerText = "Register New Content";
            document.getElementById('episodeList').innerHTML = '<label>Episode Manifest</label>';
            document.getElementById('title').focus();
            window.scrollTo({ top: document.getElementById('uploadSection').offsetTop - 20, behavior: 'smooth' });
        }

        function hideForm() { 
            document.getElementById('uploadSection').style.display = 'none'; 
        }

        function toggleFields() {
            const type = document.getElementById('mediaType').value;
            document.getElementById('seriesFields').style.display = (type === 'series') ? 'block' : 'none';
            document.getElementById('movieFields').style.display = (type === 'movie') ? 'block' : 'none';
        }

        function addEpisode(data = {}) {
            const div = document.createElement('div');
            div.className = 'episode-card';
            div.innerHTML = `
                <div class="form-grid">
                    <input type="text" class="ep-title" placeholder="Episode Title (e.g. Episode 1)" value="${data.title || ''}">
                    <select class="ep-status">
                        <option ${data.status === 'Completed' ? 'selected' : ''}>Completed</option>
                        <option ${data.status === 'Upcoming' ? 'selected' : ''}>Upcoming</option>
                    </select>
                </div>
                <textarea class="ep-desc" placeholder="Episode Synopsis..." style="margin-top:10px">${data.description || ''}</textarea>
                <input type="text" class="ep-link" placeholder="Stream link (m3u8/mp4)" style="margin-top:10px" value="${data.link || ''}">
                <input type="text" class="ep-download" placeholder="Download Link (Direct MP4 URL)" style="margin-top:10px; background:#111;" value="${data.download || ''}">
                <textarea class="ep-vtt" placeholder="Paste Subtitle Data (VTT)..." style="margin-top:10px">${data.vtt || ''}</textarea>
                <button type="button" onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--danger); cursor:pointer; margin-top:10px; font-size:0.7rem;">[ REMOVE EPISODE ]</button>
            `;
            document.getElementById('episodeList').appendChild(div);
        }

        function editItem(type, title) {
            const item = fullLibrary[type === 'series' ? 'series' : 'movies'].find(i => i.title === title);
            if (!item) return;

            editingId = title;
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('formTitle').innerText = "Editing: " + item.title;
            
            document.getElementById('mediaType').value = type;
            document.getElementById('title').value = item.title;
            document.getElementById('synopsis').value = item.synopsis || "";
            document.getElementById('cover').value = item.cover || "";
            document.getElementById('backdrop').value = item.backdrop || "";
            document.getElementById('trailerLink').value = item.trailerLink || "";
            document.getElementById('genres').value = item.genres ? item.genres.join(',') : "";
            document.getElementById('isHero').value = item.isHero || "NO";
            document.getElementById('status').value = item.status || "Ongoing";
            
            toggleFields();

            if (type === 'series') {
                document.getElementById('seasons').value = item.seasons || 1;
                document.getElementById('totalEpisodes').value = item.totalEpisodes || "";
                document.getElementById('episodeList').innerHTML = '<label>Episode Manifest</label>';
                if(item.episodes) item.episodes.forEach(ep => addEpisode(ep));
            } else {
                document.getElementById('movieLink').value = item.videoLink || "";
                document.getElementById('movieDownload').value = item.downloadLink || "";
                document.getElementById('movieVtt').value = item.vtt || "";
                document.getElementById('movieDate').value = item.releaseDate || "";
            }
            window.scrollTo({ top: document.getElementById('uploadSection').offsetTop - 20, behavior: 'smooth' });
        }

        async function saveToBoda() {
            const btn = document.getElementById('saveBtn');
            const type = document.getElementById('mediaType').value;
            const binId = (type === 'series') ? SERIES_BIN : MOVIES_BIN;

            btn.innerText = "AUTHENTICATING & SYNCING...";
            btn.disabled = true;

            let episodes = [];
            if (type === 'series') {
                document.querySelectorAll('.episode-card').forEach(card => {
                    episodes.push({
                        title: card.querySelector('.ep-title').value,
                        description: card.querySelector('.ep-desc').value,
                        status: card.querySelector('.ep-status').value,
                        link: card.querySelector('.ep-link').value,
                        download: card.querySelector('.ep-download').value,
                        vtt: card.querySelector('.ep-vtt').value
                    });
                });
            }

            const payload = {
                title: document.getElementById('title').value,
                synopsis: document.getElementById('synopsis').value,
                cover: document.getElementById('cover').value,
                backdrop: document.getElementById('backdrop').value,
                trailerLink: document.getElementById('trailerLink').value,
                genres: document.getElementById('genres').value.split(',').map(g => g.trim()),
                isHero: document.getElementById('isHero').value,
                status: document.getElementById('status').value,
                timestamp: new Date().toISOString()
            };

            if (type === 'series') {
                payload.seasons = document.getElementById('seasons').value;
                payload.totalEpisodes = document.getElementById('totalEpisodes').value;
                payload.episodes = episodes;
            } else {
                payload.videoLink = document.getElementById('movieLink').value;
                payload.downloadLink = document.getElementById('movieDownload').value;
                payload.vtt = document.getElementById('movieVtt').value;
                payload.release
