<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODA Admin | Content Management</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --bg-black: #050505;
            --surface: #121212;
            --input-bg: #1a1a1a;
            --text-light: #f5f5f5;
            --border: rgba(212, 175, 55, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Cormorant Garamond', serif;
            background-color: var(--bg-black);
            color: var(--text-light);
        }

        h1, h2, h3, button, input, select, textarea, label {
            font-family: 'Cinzel', serif;
        }

        header {
            padding: 20px 5%;
            background: var(--surface);
            border-bottom: 1px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-nav {
            padding: 20px 5%;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            background: #0a0a0a;
        }

        input, select, textarea {
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-gold { background: var(--gold); color: black; font-weight: bold; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-danger { background: #8b0000; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 0.6rem; }

        .dashboard-grid {
            padding: 30px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .item-card img { width: 100%; height: 180px; object-fit: cover; }
        .item-content { padding: 15px; flex-grow: 1; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            overflow-y: auto;
            padding: 50px 0;
        }

        .modal-content {
            background: var(--surface);
            margin: auto;
            width: 90%;
            max-width: 850px;
            padding: 40px;
            border: 1px solid var(--gold);
            border-radius: 8px;
        }

        .form-section { margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .episode-box {
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 3px solid var(--gold);
            border-radius: 4px;
        }

        .subtitle-entry {
            background: #252525;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px dashed #444;
        }

        .genre-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .genre-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
        .genre-item input { width: auto; margin-bottom: 0; }
    </style>
</head>

<body>

    <header>
        <h2>BODA LUXE | Admin</h2>
        <button class="btn btn-gold" onclick="openModal()"><i class="fa-solid fa-plus"></i> Add Title</button>
    </header>

    <div class="admin-nav">
        <div style="flex-grow: 1;"><input type="text" id="search" placeholder="Search by title..." oninput="filterList()"></div>
        <div style="width: 200px;">
            <select id="catFilter" onchange="filterList()">
                <option value="all">All Categories</option>
                <option value="Korean Drama">K-Drama</option>
                <option value="Chinese Drama">C-Drama</option>
                <option value="PH-Drama">PH-Drama</option>
                <option value="TV Show">TV Show</option>
                <option value="Tagalog Dubbed">Tagalog Dubbed</option>
                <option value="Movie">Movies</option>
            </select>
        </div>
    </div>

    <div class="dashboard-grid" id="mainGrid"></div>

    <!-- MAIN MODAL -->
    <div id="masterModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: var(--gold); margin-top: 0;">Add New Title</h2>
            <form id="bodaForm">
                <input type="hidden" id="editId">

                <div class="form-section">
                    <label>Main Category</label>
                    <select id="mainCategory" onchange="toggleFormType()" required>
                        <option value="Korean Drama">Korean Drama</option>
                        <option value="Chinese Drama">Chinese Drama</option>
                        <option value="PH-Drama">PH-Drama</option>
                        <option value="TV Show">TV Show</option>
                        <option value="Tagalog Dubbed">Tagalog Dubbed</option>
                        <option value="Movie">Movies</option>
                    </select>
                </div>

                <div class="grid-2 form-section">
                    <div><label>Title</label><input type="text" id="title" required></div>
                    <div><label>Year</label><input type="number" id="year" required></div>
                </div>

                <div class="form-section">
                    <label>Synopsis</label>
                    <textarea id="synopsis" rows="4"></textarea>
                </div>

                <div class="form-section">
                    <label>Genres</label>
                    <div class="genre-grid" id="genreContainer"></div>
                </div>

                <div class="grid-2 form-section">
                    <div>
                        <label>Status</label>
                        <select id="status">
                            <option value="Completed">Completed</option>
                            <option value="Ongoing">Ongoing</option>
                            <option value="Upcoming">Upcoming</option>
                        </select>
                    </div>
                    <div id="epCountContainer">
                        <label>No. of Episodes</label>
                        <input type="number" id="epCount">
                    </div>
                </div>

                <div class="form-section">
                    <label>Display on Slideshow Banner?</label>
                    <select id="isBanner">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>

                <div class="form-section">
                    <label>Media Assets</label>
                    <input type="text" id="coverImg" placeholder="Cover Image URL (Poster)">
                    <input type="text" id="backdropImg" placeholder="Backdrop Image URL (Horizontal)">
                    <input type="text" id="trailer" placeholder="YouTube Trailer Link">
                </div>

                <!-- VIDEO SECTION -->
                <div class="form-section" id="videoSection">
                    <label style="display:block; margin-bottom:10px; font-weight: bold; color: var(--gold);">Video & Audio Sources</label>

                    <!-- MOVIE SPECIFIC -->
                    <div id="movieLinkBox">
                        <input type="text" id="movieUrl" placeholder="Direct Video Link (m3u8/mp4)">
                        <input type="text" id="movieAudioUrl" placeholder="External Audio Link (Optional)">
                        <div id="movieSubsContainer"></div>
                        <button type="button" class="btn btn-outline btn-sm" onclick="addSubtitleField('movieSubsContainer')">+ Add Subtitle Track</button>
                    </div>

                    <!-- DRAMA SPECIFIC -->
                    <div id="episodeBoxContainer" style="display:none;">
                        <div id="episodesList"></div>
                        <button type="button" class="btn btn-outline" style="margin-top:10px;" onclick="addEpField()">+ Add New Episode</button>
                    </div>
                </div>

                <div style="display:flex; gap:15px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-gold">Save to Database</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
        const BINS = {
            drama: "69f3074faaba882197550749",
            movies: "69f307c736566621a80b4134"
        };
        let localData = [];

        const genreSets = {
            tv: ['Drama', 'Comedy', 'Romance', 'Sci-fi', 'Fantasy', 'Sports', 'Action', 'Adventure', 'Animated', 'Live action', 'Revenge', 'Medical'],
            shows: ['Talk', 'Variety', 'Reality', 'Survival', 'Talent', 'Game']
        };

        function toggleFormType() {
            const cat = document.getElementById('mainCategory').value;
            const genreContainer = document.getElementById('genreContainer');
            const epCount = document.getElementById('epCountContainer');
            const movieBox = document.getElementById('movieLinkBox');
            const epBox = document.getElementById('episodeBoxContainer');

            let selectedGenres = (cat === 'TV Show') ? genreSets.shows : genreSets.tv;
            genreContainer.innerHTML = selectedGenres.map(g => `
                <div class="genre-item"><input type="checkbox" name="genre" value="${g}"> ${g}</div>
            `).join('');

            if (cat === 'Movie') {
                epCount.style.display = 'none';
                movieBox.style.display = 'block';
                epBox.style.display = 'none';
            } else {
                epCount.style.display = 'block';
                movieBox.style.display = 'none';
                epBox.style.display = 'block';
            }
        }

        function addSubtitleField(containerId, data = null) {
            const container = document.getElementById(containerId);
            const subDiv = document.createElement('div');
            subDiv.className = 'subtitle-entry';

            const langs = ['English', 'Filipino', 'Korean', 'Chinese', 'Indo'];
            const isOther = data && !langs.includes(data.lang);

            subDiv.innerHTML = `
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <select class="sub-lang" onchange="this.nextElementSibling.style.display = (this.value === 'Other') ? 'block' : 'none'" style="flex:1;">
                        ${langs.map(l => `<option value="${l}" ${data?.lang === l ? 'selected' : ''}>${l}</option>`).join('')}
                        <option value="Other" ${isOther ? 'selected' : ''}>Other</option>
                    </select>
                    <input type="text" class="custom-lang" placeholder="Language Name" style="flex:1; display:${isOther ? 'block' : 'none'};" value="${isOther ? data.lang : ''}">
                    <button type="button" onclick="this.parentElement.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer;">&times;</button>
                </div>
                <textarea placeholder="Paste SRT content here..." class="sub-content" rows="3">${data?.content || ''}</textarea>
            `;
            container.appendChild(subDiv);
        }

        function addEpField(data = null) {
            const container = document.getElementById('episodesList');
            const epId = 'subs_' + Math.random().toString(36).substr(2, 9);
            const epDiv = document.createElement('div');
            epDiv.className = 'episode-box';
            epDiv.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <strong>Episode Content</strong>
                    <button type="button" onclick="this.parentElement.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer;">Remove Ep</button>
                </div>
                <input type="text" placeholder="Episode Title (e.g. Ep 1)" class="ep-title" value="${data?.title || ''}">
                <input type="text" placeholder="Video URL" class="ep-url" value="${data?.url || ''}">
                <input type="text" placeholder="Audio URL (Alternative)" class="ep-audio" value="${data?.audio || ''}">
                <div id="${epId}"></div>
                <button type="button" class="btn btn-outline btn-sm" onclick="addSubtitleField('${epId}')" style="margin-top:5px;">+ Add Subtitle</button>
            `;
            container.appendChild(epDiv);
            if (data?.subtitles) data.subtitles.forEach(s => addSubtitleField(epId, s));
        }

        async function fetchBin(id) {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, { headers: { 'X-Master-Key': API_KEY } });
            const j = await r.json();
            return Array.isArray(j.record) ? j.record : [];
        }

        async function loadAll() {
            try {
                const [d, m] = await Promise.all([fetchBin(BINS.drama), fetchBin(BINS.movies)]);
                localData = [...d.map(i => ({ ...i, b: BINS.drama })), ...m.map(i => ({ ...i, b: BINS.movies }))];
                render(localData);
            } catch (err) { console.error("Load error:", err); }
        }

        function render(data) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = data.map(item => `
                <div class="item-card">
                    <img src="${item.poster || 'https://via.placeholder.com/280x180'}" alt="">
                    <div class="item-content">
                        <span class="item-tag">${item.category}</span>
                        <h3>${item.title}</h3>
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-outline btn-sm" onclick="editItem('${item.id}')">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteItem('${item.id}', '${item.b}')">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterList() {
            const term = document.getElementById('search').value.toLowerCase();
            const cat = document.getElementById('catFilter').value;
            const filtered = localData.filter(i => (cat === 'all' || i.category === cat) && i.title.toLowerCase().includes(term));
            render(filtered);
        }

        function openModal() {
            document.getElementById('bodaForm').reset();
            document.getElementById('episodesList').innerHTML = '';
            document.getElementById('movieSubsContainer').innerHTML = '';
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').innerText = 'Add New Title';
            toggleFormType();
            document.getElementById('masterModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('masterModal').style.display = 'none'; }

        function editItem(id) {
            const item = localData.find(i => i.id == id);
            if (!item) return;
            openModal();
            document.getElementById('modalTitle').innerText = 'Edit: ' + item.title;
            document.getElementById('editId').value = item.id;
            document.getElementById('mainCategory').value = item.category;
            toggleFormType();

            document.getElementById('title').value = item.title;
            document.getElementById('year').value = item.year;
            document.getElementById('synopsis').value = item.synopsis;
            document.getElementById('status').value = item.status;
            document.getElementById('isBanner').value = item.isBanner;
            document.getElementById('coverImg').value = item.poster;
            document.getElementById('backdropImg').value = item.backdrop;
            document.getElementById('trailer').value = item.trailer;

            if (item.genres) {
                document.querySelectorAll('input[name="genre"]').forEach(cb => cb.checked = item.genres.includes(cb.value));
            }

            if (item.category === 'Movie') {
                document.getElementById('movieUrl').value = item.videoUrl || '';
                document.getElementById('movieAudioUrl').value = item.audioUrl || '';
                item.subtitles?.forEach(s => addSubtitleField('movieSubsContainer', s));
            } else {
                document.getElementById('epCount').value = item.epCount || '';
                item.episodes?.forEach(ep => addEpField(ep));
            }
        }

        function collectSubs(container) {
            return Array.from(container.querySelectorAll('.subtitle-entry')).map(entry => {
                const sel = entry.querySelector('.sub-lang').value;
                const custom = entry.querySelector('.custom-lang').value;
                return {
                    lang: sel === 'Other' ? custom : sel,
                    content: entry.querySelector('.sub-content').value
                };
            });
        }

        document.getElementById('bodaForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value || Date.now().toString();
            const cat = document.getElementById('mainCategory').value;
            const binId = (cat === 'Movie') ? BINS.movies : BINS.drama;

            let itemData = {
                id, category: cat, title: document.getElementById('title').value,
                year: document.getElementById('year').value,
                synopsis: document.getElementById('synopsis').value,
                genres: Array.from(document.querySelectorAll('input[name="genre"]:checked')).map(cb => cb.value),
                status: document.getElementById('status').value,
                isBanner: document.getElementById('isBanner').value,
                poster: document.getElementById('coverImg').value,
                backdrop: document.getElementById('backdropImg').value,
                trailer: document.getElementById('trailer').value
            };

            if (cat === 'Movie') {
                itemData.videoUrl = document.getElementById('movieUrl').value;
                itemData.audioUrl = document.getElementById('movieAudioUrl').value;
                itemData.subtitles = collectSubs(document.getElementById('movieSubsContainer'));
            } else {
                itemData.epCount = document.getElementById('epCount').value;
                itemData.episodes = Array.from(document.querySelectorAll('.episode-box')).map(box => ({
                    title: box.querySelector('.ep-title').value,
                    url: box.querySelector('.ep-url').value,
                    audio: box.querySelector('.ep-audio').value,
                    subtitles: collectSubs(box)
                }));
            }

            try {
                let fullBin = await fetchBin(binId);
                const idx = fullBin.findIndex(i => i.id == id);
                if (idx > -1) fullBin[idx] = itemData; else fullBin.push(itemData);

                await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(fullBin)
                });
                alert('Saved successfully!');
                location.reload();
            } catch (err) { alert('Error saving data.'); }
        };

        async function deleteItem(id, bId) {
            if (!confirm('Confirm delete?')) return;
            try {
                let bin = await fetchBin(bId);
                bin = bin.filter(i => i.id != id);
                await fetch(`https://api.jsonbin.io/v3/b/${bId}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(bin)
                });
                location.reload();
            } catch (err) { console.error(err); }
        }

        window.onload = loadAll;
    </script>
</body>
</html>
